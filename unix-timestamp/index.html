<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Unix 时间戳转换 | 在线工具</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; }
        body {
            background: linear-gradient(145deg, #f5f7fc 0%, #e9eef5 100%);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 20px; margin: 0;
        }
        .card {
            max-width: 900px; width: 100%;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header { background: #0f172a; padding: 1.2rem 2rem; color: white; }
        .header h1 { margin: 0; font-size: 1.8rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .badge { background: #2dd4bf20; border-radius: 40px; padding: 0.2rem 0.8rem; font-size: 0.8rem; border: 1px solid #2dd4bf50; }
        .container { padding: 2rem; }
        .live-section {
            background: #1e293b; border-radius: 1.5rem; padding: 1.5rem; text-align: center; margin-bottom: 2rem;
        }
        .live-label { color: #94a3b8; font-size: 0.85rem; margin-bottom: 0.5rem; }
        .live-value { color: #2dd4bf; font-size: 2.5rem; font-weight: 700; font-family: 'SF Mono', 'Cascadia Code', monospace; word-break: break-all; }
        .live-date { color: #e2e8f0; font-size: 1rem; margin-top: 0.5rem; }
        .divider {
            display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; color: #94a3b8; font-size: 0.85rem;
        }
        .divider::before, .divider::after { content: ''; flex: 1; border-top: 1px solid #e2e8f0; }
        .input-group { margin-bottom: 1.2rem; }
        label { display: block; font-weight: 600; color: #0f172a; margin-bottom: 6px; font-size: 0.9rem; }
        input, textarea {
            width: 100%; padding: 0.8rem 1rem; font-family: 'SF Mono', 'Cascadia Code', monospace;
            font-size: 1rem; border: 1px solid #cbd5e1; border-radius: 1.2rem;
            background: white; transition: 0.1s;
        }
        input:focus, textarea:focus { outline: none; border-color: #0f172a; box-shadow: 0 0 0 3px #0f172a20; }
        .btn {
            background: white; border: 1px solid #cbd5e1; padding: 10px 20px;
            border-radius: 60px; font-weight: 500; cursor: pointer; transition: 0.2s; font-size: 0.9rem;
        }
        .btn-primary { background: #0f172a; border-color: #0f172a; color: white; }
        .btn-primary:hover { background: #1e293b; transform: translateY(-1px); }
        .btn-outline:hover { background: #f1f5f9; }
        .btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
        .result-card {
            background: #f8fafc; border-radius: 1rem; padding: 1rem; margin-top: 0.8rem;
            border: 1px solid #e2e8f0;
        }
        .result-label { font-size: 0.8rem; color: #64748b; }
        .result-value { font-size: 1.1rem; font-weight: 600; color: #0f172a; word-break: break-all; font-family: 'SF Mono', 'Cascadia Code', monospace; }
        .footer { background: #f1f5f9; padding: 1rem 2rem; text-align: center; font-size: 0.8rem; color: #475569; border-top: 1px solid #e2e8f0; }
        .footer a { color: #15607a; text-decoration: none; }
        .toast-msg {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: #0f172a; color: white; padding: 8px 20px; border-radius: 40px;
            font-size: 0.8rem; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999;
        }
        @media (max-width: 680px) {
            .container { padding: 1.2rem; }
            .live-value { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>⏱️ Unix 时间戳转换器 <span class="badge">实时 · 秒/毫秒</span></h1>
        <p>实时显示当前 Unix 时间戳，支持时间戳与日期时间互转</p>
    </div>
    <div class="container">
        <div class="live-section">
            <div class="live-label">🕐 当前 Unix 时间戳（秒）</div>
            <div class="live-value" id="liveSeconds">-</div>
            <div class="live-date" id="liveDate">-</div>
            <div class="live-date" style="margin-top:0.2rem; font-size:0.85rem; color:#94a3b8;">
                毫秒：<span id="liveMillis" style="font-family:'SF Mono',monospace;">-</span>
            </div>
        </div>

        <div style="margin-bottom: 1rem;">
            <label>🔢 时间戳 → 日期时间</label>
            <input type="text" id="tsInput" placeholder="输入 Unix 时间戳，如 1717488000（秒）或 1717488000000（毫秒）">
            <div class="btn-row">
                <button class="btn btn-primary" id="tsToDateBtn">⬇ 转换为日期</button>
                <button class="btn btn-outline" id="tsNowBtn">📌 填入当前秒时间戳</button>
            </div>
            <div class="result-card" id="tsResultCard" style="display:none;">
                <div><span class="result-label">🕐 UTC 时间：</span><span class="result-value" id="tsUtcResult">-</span></div>
                <div style="margin-top:4px;"><span class="result-label">📍 本地时间：</span><span class="result-value" id="tsLocalResult">-</span></div>
                <div style="margin-top:4px;"><span class="result-label">📅 ISO 8601：</span><span class="result-value" id="tsIsoResult">-</span></div>
            </div>
        </div>

        <div class="divider">⬇ 反向转换 ⬇</div>

        <div>
            <label>📅 日期时间 → 时间戳</label>
            <input type="datetime-local" id="dtInput">
            <div class="btn-row">
                <button class="btn btn-primary" id="dtToTsBtn">⬆ 转换为时间戳</button>
                <button class="btn btn-outline" id="dtNowBtn">📌 填入当前时间</button>
            </div>
            <div class="result-card" id="dtResultCard" style="display:none;">
                <div><span class="result-label">秒时间戳：</span><span class="result-value" id="dtSecResult">-</span></div>
                <div style="margin-top:4px;"><span class="result-label">毫秒时间戳：</span><span class="result-value" id="dtMsResult">-</span></div>
            </div>
        </div>
    </div>
    <div class="footer">
        🧰 ACE 实验室 · 开源工具 | <a href="https://github.com/ace-trump-tech/html-lab" target="_blank">GitHub 仓库</a>
    </div>
</div>
<div id="toastMsg" class="toast-msg">✨ 已复制</div>

<script>
(function() {
    var toast = document.getElementById('toastMsg');
    var toastTimer = null;

    function showToast(msg, isErr) {
        if (toastTimer) clearTimeout(toastTimer);
        toast.textContent = msg;
        toast.style.background = isErr ? '#be123c' : '#0f172a';
        toast.style.opacity = '1';
        toastTimer = setTimeout(function() { toast.style.opacity = '0'; }, 1800);
    }

    function updateLive() {
        var now = new Date();
        var sec = Math.floor(now.getTime() / 1000);
        var ms = now.getTime();
        document.getElementById('liveSeconds').textContent = sec.toLocaleString();
        document.getElementById('liveMillis').textContent = ms.toLocaleString();
        document.getElementById('liveDate').textContent = now.toLocaleString('zh-CN', { timeZoneName: 'short' });
    }
    updateLive();
    setInterval(updateLive, 500);

    document.getElementById('tsToDateBtn').addEventListener('click', function() {
        var val = document.getElementById('tsInput').value.trim();
        if (!val) { showToast('⚠️ 请输入时间戳', true); return; }
        var ts = parseInt(val, 10);
        if (isNaN(ts)) { showToast('⚠️ 无效的时间戳', true); return; }
        if (ts > 9999999999999 || ts < -9999999999999) { showToast('⚠️ 时间戳超出范围', true); return; }
        // auto-detect seconds vs milliseconds
        if (ts < 100000000000) ts = ts * 1000; // looks like seconds
        var d = new Date(ts);
        if (isNaN(d.getTime())) { showToast('⚠️ 无效的时间戳', true); return; }
        document.getElementById('tsUtcResult').textContent = d.toUTCString();
        document.getElementById('tsLocalResult').textContent = d.toLocaleString('zh-CN', { timeZoneName: 'short' });
        document.getElementById('tsIsoResult').textContent = d.toISOString();
        document.getElementById('tsResultCard').style.display = 'block';
    });

    document.getElementById('tsNowBtn').addEventListener('click', function() {
        document.getElementById('tsInput').value = Math.floor(Date.now() / 1000);
    });

    document.getElementById('dtToTsBtn').addEventListener('click', function() {
        var val = document.getElementById('dtInput').value;
        if (!val) { showToast('⚠️ 请选择日期时间', true); return; }
        var d = new Date(val);
        var sec = Math.floor(d.getTime() / 1000);
        var ms = d.getTime();
        document.getElementById('dtSecResult').textContent = sec.toLocaleString();
        document.getElementById('dtMsResult').textContent = ms.toLocaleString();
        document.getElementById('dtResultCard').style.display = 'block';
    });

    document.getElementById('dtNowBtn').addEventListener('click', function() {
        var now = new Date();
        // Format as YYYY-MM-DDTHH:mm for datetime-local input
        var yyyy = now.getFullYear();
        var mm = String(now.getMonth() + 1).padStart(2, '0');
        var dd = String(now.getDate()).padStart(2, '0');
        var hh = String(now.getHours()).padStart(2, '0');
        var min = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('dtInput').value = yyyy + '-' + mm + '-' + dd + 'T' + hh + ':' + min;
    });

    // Click-to-copy on result values
    document.querySelectorAll('.result-value').forEach(function(el) {
        el.style.cursor = 'pointer';
        el.title = '点击复制';
        el.addEventListener('click', function() {
            var text = el.textContent;
            navigator.clipboard.writeText(text).then(function() {
                showToast('📋 已复制: ' + text);
            }).catch(function() { showToast('⚠️ 复制失败', true); });
        });
    });

    // Init datetime-local with current time
    document.getElementById('dtNowBtn').click();
})();
</script>
</body>
</html>
