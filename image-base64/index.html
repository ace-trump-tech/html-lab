<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>图片Base64转换 | 在线工具</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; }
        body { background: linear-gradient(145deg, #f5f7fc 0%, #e9eef5 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; margin: 0; }
        .card { max-width: 900px; width: 100%; background: rgba(255,255,255,0.92); backdrop-filter: blur(2px); border-radius: 2rem; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: #0f172a; padding: 1.2rem 2rem; color: white; }
        .header h1 { margin: 0; font-size: 1.8rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .badge { background: #2dd4bf20; border-radius: 40px; padding: 0.2rem 0.8rem; font-size: 0.8rem; border: 1px solid #2dd4bf50; }
        .container { padding: 2rem; }
        .upload-area { border: 2px dashed #cbd5e1; border-radius: 1.5rem; padding: 1.5rem; text-align: center; margin-bottom: 1rem; cursor: pointer; transition: 0.2s; }
        .upload-area:hover { border-color: #0f172a; background: #f8fafc; }
        .upload-area input[type="file"] { display: none; }
        .tabs { display: flex; gap: 8px; margin-bottom: 1rem; }
        .tab-btn { padding: 8px 18px; border-radius: 60px; border: 1px solid #cbd5e1; background: white; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
        .tab-btn.active { background: #0f172a; color: white; border-color: #0f172a; }
        label { display: block; font-weight: 600; color: #0f172a; margin-bottom: 4px; font-size: 0.85rem; }
        textarea { width: 100%; padding: 1rem; font-family: 'SF Mono', 'Cascadia Code', monospace; font-size: 0.8rem; border: 1px solid #cbd5e1; border-radius: 1.2rem; background: white; resize: vertical; line-height: 1.5; min-height: 80px; }
        textarea:focus { outline: none; border-color: #0f172a; box-shadow: 0 0 0 3px #0f172a20; }
        .preview-box { text-align: center; margin: 1rem 0; }
        .preview-box img { max-width: 100%; max-height: 300px; border-radius: 1rem; border: 1px solid #e2e8f0; }
        .btn { background: white; border: 1px solid #cbd5e1; padding: 10px 20px; border-radius: 60px; font-weight: 500; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .btn-primary { background: #0f172a; border-color: #0f172a; color: white; }
        .btn-primary:hover { background: #1e293b; transform: translateY(-1px); }
        .btn-outline:hover { background: #f1f5f9; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .footer { background: #f1f5f9; padding: 1rem 2rem; text-align: center; font-size: 0.8rem; color: #475569; border-top: 1px solid #e2e8f0; }
        .footer a { color: #15607a; text-decoration: none; }
        .toast-msg { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 8px 20px; border-radius: 40px; font-size: 0.8rem; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; }
        @media (max-width: 680px) { .container { padding: 1.2rem; } }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>📇 图片 Base64 转换 <span class="badge">图片 ⇄ Base64 · 纯前端</span></h1>
        <p>图片文件与 Base64 字符串互相转换，支持 Data URI 格式生成与解析</p>
    </div>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" data-tab="img2b64">🖼️ 图片 → Base64</button>
            <button class="tab-btn" data-tab="b642img">📝 Base64 → 图片</button>
        </div>
        <div id="tabImg2B64">
            <div class="upload-area" id="uploadArea">
                📁 点击或拖拽上传图片
                <input type="file" id="fileInput" accept="image/*">
            </div>
            <label>📋 Base64 输出（Data URI 格式）</label>
            <textarea id="b64Output" rows="6" readonly placeholder="上传图片后自动生成 Base64..."></textarea>
            <div class="toolbar" style="margin-top:0.8rem;">
                <button class="btn btn-outline" id="copyB64Btn">📋 复制 Base64</button>
            </div>
        </div>
        <div id="tabB642Img" style="display:none;">
            <label>📝 粘贴 Base64 字符串（含或不含 data:image/... 前缀）</label>
            <textarea id="b64Input" rows="4" placeholder="粘贴 Base64 字符串...&#10;例如：data:image/png;base64,iVBORw0KGgo..."></textarea>
            <div class="toolbar" style="margin-top:0.8rem;">
                <button class="btn btn-primary" id="decodeB64Btn">🔓 显示图片</button>
                <button class="btn btn-outline" id="downloadB64Btn">⬇️ 下载图片</button>
            </div>
            <div class="preview-box" id="b64Preview" style="display:none;"></div>
        </div>
    </div>
    <div class="footer">🧰 ACE 实验室 · 开源工具 | <a href="https://github.com/ace-trump-tech/html-lab" target="_blank">GitHub 仓库</a> &nbsp;| <a href="../"><strong>← 返回首页</strong></a></div>
</div>
<div id="toastMsg" class="toast-msg">📋 已复制</div>
<script>
(function() {
    var toast = document.getElementById('toastMsg');
    var toastTimer = null;
    function showToast(msg, isErr) { if (toastTimer) clearTimeout(toastTimer); toast.textContent = msg; toast.style.background = isErr ? '#be123c' : '#0f172a'; toast.style.opacity = '1'; toastTimer = setTimeout(function() { toast.style.opacity = '0'; }, 1500); }

    // Tab switch
    document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.addEventListener('click', function() {
            document.querySelectorAll('.tab-btn').forEach(function(x){x.classList.remove('active');});
            this.classList.add('active');
            var tab = this.dataset.tab;
            document.getElementById('tabImg2B64').style.display = tab === 'img2b64' ? 'block' : 'none';
            document.getElementById('tabB642Img').style.display = tab === 'b642img' ? 'block' : 'none';
        });
    });

    // Image to Base64
    document.getElementById('uploadArea').addEventListener('click', function() { document.getElementById('fileInput').click(); });
    document.getElementById('uploadArea').addEventListener('dragover', function(e) { e.preventDefault(); });
    document.getElementById('uploadArea').addEventListener('drop', function(e) { e.preventDefault(); var f = e.dataTransfer.files[0]; if (f) imgToBase64(f); });
    document.getElementById('fileInput').addEventListener('change', function() { if (this.files[0]) imgToBase64(this.files[0]); });

    function imgToBase64(file) {
        var reader = new FileReader();
        reader.onload = function(e) { document.getElementById('b64Output').value = e.target.result; showToast('✅ Base64 已生成'); };
        reader.readAsDataURL(file);
    }

    document.getElementById('copyB64Btn').addEventListener('click', function() {
        var text = document.getElementById('b64Output').value;
        if (!text) { showToast('⚠️ 请先上传图片', true); return; }
        navigator.clipboard.writeText(text).then(function() { showToast('📋 Base64 已复制（可能较大）'); });
    });

    // Base64 to Image
    document.getElementById('decodeB64Btn').addEventListener('click', function() {
        var b64 = document.getElementById('b64Input').value.trim();
        if (!b64) { showToast('⚠️ 请输入 Base64', true); return; }
        if (!b64.startsWith('data:')) { b64 = 'data:image/png;base64,' + b64; }
        var previewDiv = document.getElementById('b64Preview');
        previewDiv.innerHTML = '<img src="' + b64 + '" onerror="this.parentElement.innerHTML=\'<p style=color:#b91c1c;>❌ 无法解析 Base64 图片</p>\'">';
        previewDiv.style.display = 'block';
        showToast('✅ 图片已显示');
    });

    document.getElementById('downloadB64Btn').addEventListener('click', function() {
        var b64 = document.getElementById('b64Input').value.trim();
        if (!b64) { showToast('⚠️ 请输入 Base64', true); return; }
        if (!b64.startsWith('data:')) { b64 = 'data:image/png;base64,' + b64; }
        var a = document.createElement('a');
        a.href = b64;
        a.download = 'decoded.png';
        a.click();
        showToast('📸 下载完成');
    });
})();
</script>
</body>
</html>
