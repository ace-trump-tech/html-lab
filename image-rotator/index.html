<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>图片旋转翻转 | 在线工具</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; }
        body { background: linear-gradient(145deg, #f5f7fc 0%, #e9eef5 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; margin: 0; }
        .card { max-width: 800px; width: 100%; background: rgba(255,255,255,0.92); backdrop-filter: blur(2px); border-radius: 2rem; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: #0f172a; padding: 1.2rem 2rem; color: white; }
        .header h1 { margin: 0; font-size: 1.8rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .badge { background: #2dd4bf20; border-radius: 40px; padding: 0.2rem 0.8rem; font-size: 0.8rem; border: 1px solid #2dd4bf50; }
        .container { padding: 2rem; }
        .upload-area { border: 2px dashed #cbd5e1; border-radius: 1.5rem; padding: 1.5rem; text-align: center; margin-bottom: 1rem; cursor: pointer; transition: 0.2s; }
        .upload-area:hover { border-color: #0f172a; background: #f8fafc; }
        .upload-area input[type="file"] { display: none; }
        .preview-box { text-align: center; display: none; margin-bottom: 1rem; }
        .preview-box img { max-width: 100%; max-height: 300px; border-radius: 1rem; border: 1px solid #e2e8f0; }
        .info { font-size: 0.8rem; color: #64748b; margin-top: 4px; }
        .btn { background: white; border: 1px solid #cbd5e1; padding: 10px 18px; border-radius: 60px; font-weight: 500; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .btn-primary { background: #0f172a; border-color: #0f172a; color: white; }
        .btn-primary:hover { background: #1e293b; transform: translateY(-1px); }
        .btn-outline:hover { background: #f1f5f9; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 0.5rem; }
        .footer { background: #f1f5f9; padding: 1rem 2rem; text-align: center; font-size: 0.8rem; color: #475569; border-top: 1px solid #e2e8f0; }
        .footer a { color: #15607a; text-decoration: none; }
        .toast-msg { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 8px 20px; border-radius: 40px; font-size: 0.8rem; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; }
        @media (max-width: 680px) { .container { padding: 1.2rem; } }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>🪞 图片旋转/翻转 <span class="badge">旋转 · 镜像 · Canvas</span></h1>
        <p>旋转或翻转图片，支持 90° 旋转、水平/垂直镜像翻转</p>
    </div>
    <div class="container">
        <div class="upload-area" id="uploadArea">
            📁 点击或拖拽上传图片
            <input type="file" id="fileInput" accept="image/*">
        </div>
        <div class="preview-box" id="previewBox">
            <img id="previewImg"><div class="info" id="previewInfo"></div>
        </div>
        <div class="toolbar" style="margin-bottom:1rem;">
            <button class="btn btn-outline" id="rotateLeft">↺ 左转 90°</button>
            <button class="btn btn-outline" id="rotateRight">↻ 右转 90°</button>
            <button class="btn btn-outline" id="rotate180">🔃 旋转 180°</button>
            <button class="btn btn-outline" id="flipH">↔ 水平翻转</button>
            <button class="btn btn-outline" id="flipV">↕ 垂直翻转</button>
        </div>
        <div class="toolbar">
            <button class="btn btn-primary" id="downloadBtn">⬇️ 下载当前图片</button>
            <button class="btn btn-outline" id="resetBtn">🔄 恢复原图</button>
        </div>
    </div>
    <div class="footer">🧰 ACE 实验室 · 开源工具 | <a href="https://github.com/ace-trump-tech/html-lab" target="_blank">GitHub 仓库</a> &nbsp;| <a href="../"><strong>← 返回首页</strong></a></div>
</div>
<div id="toastMsg" class="toast-msg">✅ 完成</div>
<script>
(function() {
    var img = null, currentAngle = 0, flipH = false, flipV = false;
    var toast = document.getElementById('toastMsg');
    var toastTimer = null;

    function showToast(msg, isErr) { if (toastTimer) clearTimeout(toastTimer); toast.textContent = msg; toast.style.background = isErr ? '#be123c' : '#0f172a'; toast.style.opacity = '1'; toastTimer = setTimeout(function() { toast.style.opacity = '0'; }, 1500); }

    document.getElementById('uploadArea').addEventListener('click', function() { document.getElementById('fileInput').click(); });
    document.getElementById('uploadArea').addEventListener('dragover', function(e) { e.preventDefault(); });
    document.getElementById('uploadArea').addEventListener('drop', function(e) { e.preventDefault(); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
    document.getElementById('fileInput').addEventListener('change', function() { if (this.files[0]) loadFile(this.files[0]); });

    function loadFile(file) {
        var reader = new FileReader();
        reader.onload = function(e) {
            img = new Image();
            img.onload = function() { currentAngle = 0; flipH = false; flipV = false; renderPreview(); };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function renderPreview() {
        if (!img) return;
        var canvas = document.createElement('canvas');
        var ctx = canvas.getContext('2d');
        var w = img.width, h = img.height;

        if (currentAngle === 90 || currentAngle === 270) { canvas.width = h; canvas.height = w; }
        else { canvas.width = w; canvas.height = h; }

        ctx.save();
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.rotate(currentAngle * Math.PI / 180);
        if (flipH) ctx.scale(-1, 1);
        if (flipV) ctx.scale(1, -1);
        ctx.drawImage(img, -w/2, -h/2, w, h);
        ctx.restore();

        var url = canvas.toDataURL();
        document.getElementById('previewImg').src = url;
        document.getElementById('previewInfo').textContent = canvas.width + ' × ' + canvas.height + ' | 角度: ' + currentAngle + '° | ' + (flipH ? '水平翻转 ' : '') + (flipV ? '垂直翻转' : '');
        document.getElementById('previewBox').style.display = 'block';
    }

    document.getElementById('rotateLeft').addEventListener('click', function() { currentAngle = (currentAngle + 270) % 360; renderPreview(); });
    document.getElementById('rotateRight').addEventListener('click', function() { currentAngle = (currentAngle + 90) % 360; renderPreview(); });
    document.getElementById('rotate180').addEventListener('click', function() { currentAngle = (currentAngle + 180) % 360; renderPreview(); });
    document.getElementById('flipH').addEventListener('click', function() { flipH = !flipH; showToast(flipH ? '↔ 水平翻转' : '↔ 取消翻转'); renderPreview(); });
    document.getElementById('flipV').addEventListener('click', function() { flipV = !flipV; showToast(flipV ? '↕ 垂直翻转' : '↕ 取消翻转'); renderPreview(); });

    document.getElementById('downloadBtn').addEventListener('click', function() {
        if (!img) { showToast('⚠️ 请先上传图片', true); return; }
        var a = document.createElement('a');
        a.href = document.getElementById('previewImg').src;
        a.download = 'rotated.png'; a.click();
        showToast('📸 已下载');
    });

    document.getElementById('resetBtn').addEventListener('click', function() {
        currentAngle = 0; flipH = false; flipV = false;
        renderPreview(); showToast('🔄 已恢复原图');
    });
})();
</script>
</body>
</html>
