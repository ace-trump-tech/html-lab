<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>桃苑401 · 毕业祭 | 百死一生</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
        body { background:#020105; font-family:'Courier New', monospace; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; }
        .game-box { max-width:950px; width:100%; background:#0e0a10; border-radius:28px; box-shadow:0 25px 40px rgba(0,0,0,0.8); overflow:hidden; border:1px solid #38243b; }
        .stat-bar { background:#030006; padding:14px 22px; display:flex; justify-content:space-between; color:#bc9eb3; font-size:0.85rem; font-weight:bold; border-bottom:1px solid #2e1a2c; }
        .story-pane { background:#110b14; padding:32px 28px; min-height:400px; color:#f3e1f0; font-size:1rem; line-height:1.5; border-bottom:1px solid #2a1a27; }
        .options-pane { padding:24px 28px 32px; background:#0a060e; display:flex; flex-direction:column; gap:12px; }
        .opt-btn { background:#1f1622; border:1px solid #4c354b; color:#f5dff2; padding:12px 20px; border-radius:60px; font-size:0.9rem; font-weight:500; text-align:left; cursor:pointer; transition:0.1s; font-family:monospace; }
        .opt-btn:hover { background:#422e41; border-color:#c28bb0; transform:translateX(5px); }
        .reset-btn { background:#261c27; text-align:center; font-size:0.8rem; margin-top:8px; padding:8px; border-radius:50px; cursor:pointer; color:#be91ae; }
        .reset-btn:hover { background:#4f3650; color:white; }
        .footer-note { text-align:center; font-size:0.7rem; background:#040207; padding:12px; color:#704e6b; border-top:1px solid #261a27; }
    </style>
</head>
<body>
<div class="game-box" id="gameApp">
    <div class="stat-bar"><span>🏮 桃苑401 · 白澜</span><span id="stateFlag">🕯️ 残存理智</span></div>
    <div class="story-pane" id="storyArea"></div>
    <div class="options-pane" id="optionsArea"></div>
    <div class="footer-note">⚰️ 猎奇校园物语 | 大部分结局凄惨 | 只有一种「顺利毕业」</div>
</div>
<script>
    let game = { dead:false, week:1, lu:0, zhang:0, qian:0, hong:0, weird:0, clues:[] };
    let hidden = { 
        luLoved: false, qianRevenge: false, hongDebt: false, zhangSabotage: false, ritualParticipated: false,
        partyTriggered: false,
        killOrder: []
    };

    const ENDINGS = {
        LU_GAY:"【结局·拥抱深渊】鲁健毕业前向你表白，你拒绝后被他用键盘线勒死。",
        LU_ADDICT:"【结局·提瓦特亡灵】陪鲁健连肝七日，精神失常，延毕疯癫。",
        ZHANG_OVERDOSE:"【结局·卷死图书馆】跟随内卷节奏，心脏骤停死在考场。",
        ZHANG_BETRAY:"【结局·论文幽灵】张晨斌窃取论文，举报你学术不端。",
        QIAN_POISON:"【结局·深海溺亡】钱嘉乐捏造丑闻，你从天台坠落。",
        QIAN_DROWN:"【结局·浴缸回响】喝下饮料，醒来少了一个肾。",
        HONG_LOAN:"【结局·奢华坟场】欠巨款被卖到境外。",
        HONG_SLAVE:"【结局·契约奴】签下卖身契，沦为私人奴隶。",
        WEIRD_MIRROR:"【结局·镜中桃苑】被诡异吞噬，成为镜中第五人。",
        ALL_BETRAY:"【结局·四重奏】同时得罪所有人，人间蒸发。",
        LONELY:"【结局·透明延毕】孤独四年，延毕至死。",
        FAKE_DIPLOMA:"【结局·赝品证书】买假证逃回家，精神失常。",
        FLESH:"【结局·肉馅】偷吃和牛，被做成饺子。",
        SHRINE:"【结局·贡品】被室友献祭给宿管大妈之神。",
        TRUE:"⭐⭐⭐ 【真结局·白澜的毕业证】⭐⭐⭐ <br>你精准拿捏了每个人的分寸。毕业典礼上四人破例为你鼓掌。你拿着鲜红毕业证走出桃苑401，阳光洒落——自此，桃苑再无诅咒。",
        HIDDEN_MARRY: "【隐藏结局·原神婚礼】你和鲁健的关系超越了友情。毕业那天他穿着西装向你求婚，你含泪答应。婚后你们每天一起刷原神，但三年后他为了满命角色借了高利贷，你们一起被追债，最终跳海殉情。",
        HIDDEN_KILL_QIAN: "【隐藏结局·正义的囚徒】你成功反杀了钱嘉乐，在他准备给你下毒时用刀捅了他。警察赶到，你因故意杀人被判无期。监狱里，你收到了张晨斌寄来的考研资料，上面写着“在里面也要卷”。",
        HIDDEN_HONG_SWINDLE: "【隐藏结局·反杀富哥】你设计让洪增珏投资虚假项目，卷走他五百万。他破产后精神失常，你却因诈骗罪被通缉，永远无法毕业。",
        HIDDEN_ZHANG_BURN: "【隐藏结局·焚书坑儒】你趁张晨斌不在烧光了他所有的考研资料。他崩溃后举报你纵火，你被开除学籍，流浪街头。",
        HIDDEN_CULT_LEADER: "【隐藏结局·新任教祖】你彻底融入了宿舍的邪教，凭借口才成为新任教祖。毕业前你带领室友献祭了宿管大妈，被警方抓捕，判处死刑。",
        HIDDEN_POLICE_INFORMANT: "【隐藏结局·卧底英雄】你暗中收集了所有室友的犯罪证据，毕业时交给警方。四人全部入狱，你获得见义勇为奖，但被他们的家属报复，打断了腿。虽未毕业，但成了英雄。",
        PARTY_WRONG_ORDER: "【派对结局·猎杀反噬】你试图挑拨室友们的关系，但顺序错了。被你针对的室友察觉了你的意图，联合其他人将你按在地上。贾金灵在一旁冷笑：“可惜啊，你选错了顺序。” 你被室友们乱拳打死，尸体丢进了东湖。",
        PARTY_STAND_WRONG: "【派对结局·站队错误】你在派对上试图站在贾金灵一边，但室友们早已看穿他的诡计。他们把你和贾金灵一起绑了起来，然后用刀慢慢折磨。你最后听见的一句话是：“白澜，你居然信外人？”",
        PARTY_NEUTRAL: "【派对结局·墙头草】你两边都不敢得罪，试图保持中立。贾金灵和室友们都不信任你，派对上你被灌了毒酒，七窍流血而死。",
        PARTY_KILL_ALL: "【派对结局·黄雀在后】你成功利用贾金灵的力量依次除掉了钱嘉乐、鲁健、张晨斌、洪增珏。正当你松一口气时，贾金灵嘴角翘起V字，大笑道：“轮到你了，小宝贝～” 他掏出一把刀，划开了你的喉咙。你倒在血泊中，成了最后一个祭品。",
        PARTY_BETRAYED_BY_JIA: "【派对结局·兔死狗烹】你帮助贾金灵除掉了所有室友，但贾金灵立刻翻脸，叫来他的一帮兄弟把你打残。你被扔在垃圾堆里，奄奄一息。",
        PARTY_KILLED_BY_ROOM: "【派对结局·室友反杀】你试图偷袭室友，但他们早有防备。鲁健一键盘拍晕你，张晨斌用考研书捂住你的口鼻，钱嘉乐往你嘴里灌毒药，洪增珏则用钱砸晕你。你死得不明不白。"
    };

    function setEnding(key) { if(game.dead) return; game.dead=true; renderGame(ENDINGS[key]||"【扭曲结局】", [{text:"♾️ 重新开始", action:resetGame}]); }
    function resetGame() { 
        game={ dead:false, week:1, lu:0, zhang:0, qian:0, hong:0, weird:0, clues:[] }; 
        hidden={ luLoved:false, qianRevenge:false, hongDebt:false, zhangSabotage:false, ritualParticipated:false, partyTriggered:false, killOrder:[] };
        startGame(); 
    }
    function renderGame(txt, opts) {
        document.getElementById("storyArea").innerHTML = txt.replace(/\n/g,'<br>');
        const div = document.getElementById("optionsArea");
        div.innerHTML = "";
        for(let o of opts) {
            let btn = document.createElement("div");
            btn.className = "opt-btn";
            btn.innerText = o.text;
            btn.onclick = () => { if(game.dead && o.text!=="♾️ 重新开始") return; o.action(); };
            div.appendChild(btn);
        }
        let flag = `📆 第${game.week}周`;
        if(game.weird>=5) flag="👁️ 诡异缠身";
        if(game.dead) flag="💀 终局";
        document.getElementById("stateFlag").innerHTML = flag;
    }
    function checkDeadly() {
        if(game.lu<=-5) setEnding("LU_ADDICT");
        else if(game.lu>=5) setEnding("LU_GAY");
        else if(game.zhang<=-5) setEnding("ZHANG_BETRAY");
        else if(game.zhang>=5) setEnding("ZHANG_OVERDOSE");
        else if(game.qian<=-5) setEnding("QIAN_POISON");
        else if(game.qian>=5) setEnding("QIAN_DROWN");
        else if(game.hong<=-5) setEnding("HONG_LOAN");
        else if(game.hong>=5) setEnding("HONG_SLAVE");
        else if(game.weird>=6) setEnding("WEIRD_MIRROR");
        else if(game.lu+game.zhang+game.qian+game.hong <= -7) setEnding("ALL_BETRAY");
        else if(game.lu+game.zhang+game.qian+game.hong >= 7) setEnding("FLESH");
    }
    function advanceWeek() {
        if(game.dead) return;
        game.week++;
        if(game.week>16) { finalGraduation(); return; }
        if(game.week === 10 && !hidden.partyTriggered && game.lu>0 && game.zhang>0 && game.qian>0 && game.hong>0) {
            triggerPartyBranch();
            return;
        }
        checkDeadly();
        if(game.dead) return;
        dispatchEvent();
    }
    function startGame() {
        renderGame("九月初，你站在桃苑401门前。传闻无人正常毕业。\n推开门，四人盯着你：\n🔨鲁健：原神60级？\n📖张晨斌：四级过了吗？\n🐍钱嘉乐：祭品来了。\n💎洪增珏：缺钱找我。", [
            {text:"🎮 和鲁健聊原神", action:()=>{ game.lu+=1; advanceWeek(); }},
            {text:"📚 捧张晨斌", action:()=>{ game.zhang+=1; advanceWeek(); }},
            {text:"🤐 无视钱嘉乐", action:()=>{ game.qian-=1; advanceWeek(); }},
            {text:"💸 向洪增珏借钱", action:()=>{ game.hong-=1; advanceWeek(); }},
            {text:"🌙 深夜走廊游荡", action:()=>{ game.weird+=1; advanceWeek(); }}
        ]);
    }
    function dispatchEvent() {
        const w=game.week;
        if(w===2) week2(); else if(w===3) week3(); else if(w===4) week4(); else if(w===5) week5(); else if(w===6) week6();
        else if(w===7) week7(); else if(w===8) week8(); else if(w===9) week9(); else if(w===10) week10();
        else if(w===11) week11(); else if(w===12) week12(); else if(w===13) week13(); else if(w===14) week14();
        else if(w===15) week15(); else advanceWeek();
    }
    // ========== 正常周事件 ==========
    function week2() { renderGame("第2周，鲁健凌晨邀你打深渊，桌上放着美工刀。", [
        {text:"陪他打游戏", action:()=>{ game.lu+=1; advanceWeek(); }},
        {text:"劝他睡觉", action:()=>{ game.lu-=1; game.weird+=1; advanceWeek(); }},
        {text:"假装睡着", action:()=>{ game.weird+=1; game.clues.push("美工刀"); advanceWeek(); }}
    ]);}
    function week3() { renderGame("第3周，张晨斌邀你加入“凌晨5点学习小组”。", [
        {text:"加入", action:()=>{ game.zhang+=1; advanceWeek(); }},
        {text:"拒绝并举报", action:()=>{ game.zhang-=2; game.weird+=1; advanceWeek(); }},
        {text:"放辣椒水", action:()=>{ game.zhang-=1; game.qian+=1; advanceWeek(); }}
    ]);}
    function week4() { renderGame("第4周，钱嘉乐发你丑照配文“猪猡”。", [
        {text:"自黑回击", action:()=>{ game.qian+=1; advanceWeek(); }},
        {text:"砸他手机", action:()=>{ game.qian-=2; game.weird+=1; advanceWeek(); }},
        {text:"偷拍报复", action:()=> setEnding("QIAN_DROWN") }
    ]);}
    function week5() { renderGame("第5周，洪增珏拿出借贷合同。", [
        {text:"签字", action:()=>{ game.hong-=2; advanceWeek(); }},
        {text:"拒绝", action:()=>{ game.hong+=1; advanceWeek(); }},
        {text:"偷拍举报", action:()=>{ game.hong+=1; game.weird+=1; game.clues.push("举报信"); advanceWeek(); }}
    ]);}
    function week6() { renderGame("第6周，宿舍响起唢呐，四人朝神龛磕头。", [
        {text:"跟着磕头", action:()=>{ game.weird+=2; hidden.ritualParticipated=true; advanceWeek(); }},
        {text:"尖叫逃跑", action:()=> setEnding("SHRINE") },
        {text:"偷偷录像", action:()=>{ game.clues.push("邪教视频"); advanceWeek(); }}
    ]);}
    function week7() { renderGame("第7周，张晨斌送你巧克力，包装印着“学术共谋协议”。", [
        {text:"吃掉", action:()=>{ game.zhang+=2; advanceWeek(); }},
        {text:"转送鲁健", action:()=>{ game.lu+=1; game.zhang-=1; advanceWeek(); }},
        {text:"报警", action:()=>{ game.weird+=2; setEnding("LONELY"); }}
    ]);}
    function week8() { renderGame("第8周，鲁健说你是“天选之人”，邀你去地下祭祀。", [
        {text:"好奇前往", action:()=>{ game.lu+=1; game.weird+=1; advanceWeek(); }},
        {text:"拒绝并通知辅导员", action:()=>{ game.lu-=2; game.weird+=1; advanceWeek(); }},
        {text:"联合钱嘉乐捉弄鲁健", action:()=>{ game.qian+=1; game.lu-=1; advanceWeek(); }}
    ]);}
    function week9() { renderGame("第9周，洪增珏送你高档西装，领口二维码是卖身契。", [
        {text:"收下", action:()=>{ game.hong-=2; advanceWeek(); }},
        {text:"退还", action:()=>{ game.hong+=1; advanceWeek(); }},
        {text:"拿给钱嘉乐鉴定", action:()=>{ game.qian+=1; advanceWeek(); }}
    ]);}
    function week10() { renderGame("第10周，钱嘉乐天台约谈，说前几届学生被埋在东湖底。", [
        {text:"惊恐逃跑", action:()=> setEnding("WEIRD_MIRROR") },
        {text:"假装同意套话", action:()=>{ game.qian+=1; game.clues.push("埋骨地"); advanceWeek(); }},
        {text:"录音举报", action:()=>{ game.weird+=2; advanceWeek(); }}
    ]);}
    function week11() { renderGame("第11周，宿舍断电，四人围坐玩“贡献者”游戏。", [
        {text:"参与游戏", action:()=>{ game.weird+=2; advanceWeek(); }},
        {text:"假装肚子疼离开", action:()=>{ game.weird+=1; advanceWeek(); }},
        {text:"打开手电筒看他们的脸", action:()=> setEnding("FLESH") }
    ]);}
    function week12() { renderGame("第12周，日记本出现血字「选一个室友献祭」。", [
        {text:"报告辅导员", action:()=> setEnding("LONELY") },
        {text:"调查笔迹怀疑张晨斌", action:()=>{ game.zhang-=1; game.clues.push("血书"); advanceWeek(); }},
        {text:"装摄像头", action:()=>{ game.weird+=1; advanceWeek(); }}
    ]);}
    function week13() { renderGame("第13周，鲁健和张晨斌为你争吵，洪增珏开赌局。", [
        {text:"劝和", action:()=>{ game.lu-=1; game.zhang-=1; advanceWeek(); }},
        {text:"站鲁健", action:()=>{ game.lu+=1; game.zhang-=2; advanceWeek(); }},
        {text:"站张晨斌", action:()=>{ game.zhang+=1; game.lu-=2; advanceWeek(); }},
        {text:"押洪增珏", action:()=>{ game.hong-=1; advanceWeek(); }}
    ]);}
    function week14() { renderGame("第14周，钱嘉乐送你“毕业祝福”腌菜，内有指甲。", [
        {text:"尝一口", action:()=>{ game.qian-=2; game.weird+=1; advanceWeek(); }},
        {text:"偷偷扔掉", action:()=>{ game.qian+=1; advanceWeek(); }},
        {text:"送检报警", action:()=> setEnding("QIAN_POISON") }
    ]);}
    function week15() { renderGame("第15周，洪增珏拿出“校友联络协议”，签字就能毕业。", [
        {text:"签字拿证", action:()=> setEnding("FAKE_DIPLOMA") },
        {text:"拒绝并撕毁", action:()=>{ game.hong+=1; advanceWeek(); }},
        {text:"偷走烧掉", action:()=>{ game.hong+=1; game.weird+=1; advanceWeek(); }}
    ]);}
    // ========== 贾金灵生日派对支线（修改版：无顺序提示，剧情更详细） ==========
    function triggerPartyBranch() {
        hidden.partyTriggered = true;
        renderGame("第10周，隔壁宿舍的贾金灵笑嘻嘻地来敲门：“白澜，今晚我生日，你们宿舍一起来我房间开派对吧！有好酒好菜哦～”\n你看向室友们，鲁健两眼放光，张晨斌犹豫着说“会不会耽误学习”，钱嘉乐冷笑，洪增珏则掏出一沓钱：“我包红包。”\n贾金灵看似和善，但你总觉得他眼神里藏着刀子。", [
            {text:"🎉 去参加派对", action:()=> partyStart() },
            {text:"🚫 婉拒，留在宿舍", action:()=> { renderGame("你借口身体不适，没去派对。室友们自己去了，回来后个个红光满面，但你看他们眼神变得更加诡异。贾金灵再也没有出现在你面前。", [{text:"继续主剧情", action:()=> advanceWeek() }]); } }
        ]);
    }
    function partyStart() {
        renderGame("派对在贾金灵的房间举行。屋里灯光昏暗，桌上摆满了酒菜。贾金灵殷勤地给每个人倒酒。\n酒过三巡，贾金灵凑近你耳边说：“白澜，我听说你们宿舍四个人都不是好东西。你想不想……除掉他们？我可以帮你。”\n你心中一惊，表面却不动声色。", [
            {text:"🤝 低声答应，决定跟他联手", action:()=> partyPlot() },
            {text:"😡 猛地站起来，警告室友‘这家伙要挑拨离间！’", action:()=> partyRefuseAndWarn() },
            {text:"🍷 装作没听见，继续喝酒吃菜", action:()=> partyNeutral() }
        ]);
    }
    function partyPlot() {
        renderGame("你和贾金灵密谋，他答应提供迷药和武器，并告诉你室友们各自的弱点。\n“钱嘉乐嘴最毒，容易惹众怒；鲁健一根筋，酒后好下手；张晨斌心思细，但贪睡；洪增珏最精明，得先引开他。”\n贾金灵递给你一块湿毛巾：“今晚你第一个目标，就是正在阳台抽烟的钱嘉乐。”\n你深吸一口气，走向阳台。", [
            {text:"🔪 拿起湿毛巾，悄悄靠近钱嘉乐背后", action:()=> killQian() },
            {text:"😰 觉得太冒险，先去找鲁健套近乎", action:()=> partyWrongOrder() },
            {text:"🤔 犹豫不决，在走廊里来回踱步", action:()=> partyNeutral() }
        ]);
    }
    function killQian() {
        renderGame("你悄悄走到钱嘉乐身后，趁他不备，用湿毛巾死死捂住他的口鼻。他拼命挣扎，指甲抓破了你的手背，但几分钟后身体逐渐瘫软。你把他拖进卫生间，伪造了醉酒溺亡的现场。\n贾金灵竖起大拇指：“干得漂亮。接下来，鲁健正在和洪增珏拼酒，他快醉了。”\n你看着醉醺醺的鲁健，心中盘算着下一步。", [
            {text:"🍺 等鲁健喝醉，扶他到床上用枕头闷死他", action:()=> killLu() },
            {text:"📚 趁鲁健不注意，先去对付角落里的张晨斌", action:()=> partyWrongOrder() }
        ]);
    }
    function killLu() {
        renderGame("鲁健醉得不省人事，你把他扶到床上，用枕头捂住了他的脸。他双脚踢了几下就没了动静，嘴角还挂着傻笑。\n贾金灵帮你处理了尸体，擦干地上的酒渍。现在房间里只剩下张晨斌和洪增珏。张晨斌正在角落里背单词，洪增珏在数钱。\n贾金灵低声道：“张晨斌警惕性低，你去他水杯里下点东西。”", [
            {text:"📖 往张晨斌的水杯里倒入安眠药粉末", action:()=> killZhang() },
            {text:"💰 先对付洪增珏，偷走他的钱包引开注意力", action:()=> partyWrongOrder() }
        ]);
    }
    function killZhang() {
        renderGame("张晨斌喝了你的水后，很快趴在桌上昏睡过去。你用塑料袋套住他的头，几分钟后他停止了呼吸。\n贾金灵笑道：“只剩最后一个了。” 洪增珏似乎察觉到了什么，猛地起身往门口跑。", [
            {text:"💵 抄起桌上的花瓶，追上去猛砸他的后脑", action:()=> killHong() },
            {text:"🏃 让贾金灵去追，自己躲在角落", action:()=> partyWrongOrder() }
        ]);
    }
    function killHong() {
        renderGame("你追上洪增珏，在他开门的一瞬间用花瓶猛砸他的后脑。花瓶碎裂，洪增珏倒地抽搐了几下就死了。\n房间内一片死寂。你大口喘着气，看着满地的尸体。贾金灵站在你身后，轻轻鼓掌。\n“完美，白澜，你真是天生的杀手。” 他嘴角翘起，弯成一个V字。“不过嘛……现在轮到你了，小宝贝～”\n他猛地掏出一把匕首，刺进了你的心脏。你瞪大眼睛，倒下前看见他狰狞的笑容。", [
            {text:"💀 结局", action:()=> setEnding("PARTY_KILL_ALL") }
        ]);
    }
    function partyWrongOrder() {
        renderGame("你的行动被室友察觉。鲁健第一个暴起：“白澜，你在干什么？！” 张晨斌尖叫着报警，钱嘉乐抄起酒瓶砸向你的头，洪增珏则用钱捆住你的手脚。\n贾金灵见势不妙早就溜了。你被四人按在地上，拳脚相加。最后你听见一句：“送他去东湖喂鱼。” 意识陷入黑暗。", [
            {text:"💀 结局", action:()=> setEnding("PARTY_WRONG_ORDER") }
        ]);
    }
    function partyRefuseAndWarn() {
        renderGame("你站起来大声说：“贾金灵想害我们！” 室友们愣住了。贾金灵脸色一变，突然从怀里掏出一把刀，冲向最近的鲁健。鲁健本能地用键盘挡了一下，钱嘉乐尖叫，张晨斌报警，洪增珏躲到了桌子底下。\n混乱中，贾金灵刺伤了鲁健，然后逃跑。但室友们却怀疑是你和他串通演戏。他们对你说：“白澜，你为什么和他单独密谈？你也不是好东西！”\n你们扭打在一起，最终你被四人合力制服，从窗户推了下去。", [
            {text:"💀 结局", action:()=> setEnding("PARTY_STAND_WRONG") }
        ]);
    }
    function partyNeutral() {
        renderGame("你假装什么都没发生，继续喝酒。贾金灵见你没反应，又去挑拨其他人。鲁健和他吵了起来，张晨斌劝架，钱嘉乐煽风点火，洪增珏趁机偷走了贾金灵的钱包。\n派对不欢而散。但第二天，你发现自己碗里被人下了慢性毒药。一周后，你七窍流血而死。", [
            {text:"💀 结局", action:()=> setEnding("PARTY_NEUTRAL") }
        ]);
    }
    function finalGraduation() {
        let condLu = (game.lu>=-2 && game.lu<=2);
        let condZhang = (game.zhang>=-2 && game.zhang<=2);
        let condQian = (game.qian>=-2 && game.qian<=2);
        let condHong = (game.hong>=-2 && game.hong<=2);
        let condWeird = game.weird <= 4;
        let condClues = game.clues.length >= 2;
        if(condLu && condZhang && condQian && condHong && condWeird && condClues) setEnding("TRUE");
        else setEnding("LONELY");
    }
    resetGame();
</script>

</html>
