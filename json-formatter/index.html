<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JSON 格式化校验 | 在线工具</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; }
        body {
            background: linear-gradient(145deg, #f5f7fc 0%, #e9eef5 100%);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 20px; margin: 0;
        }
        .card {
            max-width: 1200px; width: 100%;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: #0f172a;
            padding: 1.2rem 2rem; color: white;
        }
        .header h1 { margin: 0; font-size: 1.8rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .badge {
            background: #2dd4bf20; border-radius: 40px; padding: 0.2rem 0.8rem;
            font-size: 0.8rem; border: 1px solid #2dd4bf50;
        }
        .container { padding: 2rem; }
        .toolbar {
            display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; justify-content: center;
        }
        .btn {
            background: white; border: 1px solid #cbd5e1; padding: 10px 20px;
            border-radius: 60px; font-weight: 500; cursor: pointer; transition: 0.2s; font-size: 0.9rem;
        }
        .btn-primary { background: #0f172a; border-color: #0f172a; color: white; }
        .btn-primary:hover { background: #1e293b; transform: translateY(-1px); }
        .btn-outline:hover { background: #f1f5f9; }
        .btn-danger { background: #fef2f2; border-color: #fecaca; color: #b91c1c; }
        .btn-danger:hover { background: #fee2e2; }
        .row-2col { display: flex; flex-wrap: wrap; gap: 1.5rem; margin-top: 0.5rem; }
        .col { flex: 1; min-width: 280px; }
        .label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; font-weight: 600; color: #0f172a; }
        textarea {
            width: 100%; padding: 1rem; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
            font-size: 0.85rem; border: 1px solid #cbd5e1; border-radius: 1.2rem;
            background: white; resize: vertical; line-height: 1.5; tab-size: 2;
        }
        textarea:focus { outline: none; border-color: #0f172a; box-shadow: 0 0 0 3px #0f172a20; }
        pre {
            margin: 0; padding: 1rem; background: #1e293b; border-radius: 1.2rem;
            overflow-x: auto; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
            font-size: 0.85rem; line-height: 1.6; color: #e2e8f0; min-height: 200px; white-space: pre-wrap; word-break: break-all;
        }
        .json-key { color: #93c5fd; }
        .json-string { color: #86efac; }
        .json-number { color: #fde68a; }
        .json-boolean { color: #c4b5fd; }
        .json-null { color: #fca5a5; }
        .json-bracket { color: #94a3b8; }
        .error-msg { color: #fca5a5; padding: 1rem; }
        .success-msg { color: #86efac; padding: 1rem; }
        .footer {
            background: #f1f5f9; padding: 1rem 2rem; text-align: center;
            font-size: 0.8rem; color: #475569; border-top: 1px solid #e2e8f0;
        }
        .footer a { color: #15607a; text-decoration: none; }
        .toast-msg {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: #0f172a; color: white; padding: 8px 20px; border-radius: 40px;
            font-size: 0.8rem; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999;
        }
        @media (max-width: 680px) {
            .container { padding: 1.2rem; }
            .btn { padding: 6px 14px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>📋 JSON 格式化 & 校验 <span class="badge">语法高亮 · 纯前端</span></h1>
        <p>格式化、压缩、校验 JSON 数据，带语法高亮显示</p>
    </div>
    <div class="container">
        <div class="toolbar">
            <button class="btn btn-primary" id="formatBtn">✨ 格式化</button>
            <button class="btn btn-primary" id="minifyBtn">📦 压缩</button>
            <button class="btn btn-outline" id="validateBtn">✅ 校验</button>
            <button class="btn btn-outline" id="escapeBtn">⤴ 转义</button>
            <button class="btn btn-outline" id="unescapeBtn">⤵ 去转义</button>
            <button class="btn btn-outline" id="copyBtn">📋 复制结果</button>
            <button class="btn btn-danger" id="clearBtn">🗑️ 清空</button>
        </div>
        <div class="row-2col">
            <div class="col">
                <div class="label"><span>📝 JSON 输入</span></div>
                <textarea id="inputText" rows="12" placeholder='粘贴 JSON 数据...&#10;例如：{"name":"ACE","items":[1,2,3]}'></textarea>
            </div>
            <div class="col">
                <div class="label"><span>✨ 输出结果</span></div>
                <pre id="outputPre"></pre>
            </div>
        </div>
        <div style="font-size:0.85rem; background:#f8fafc; border-radius:1rem; padding:0.8rem 1rem; margin-top:1rem;">
            💡 提示：支持 Ctrl+Enter 快速格式化。所有处理均在本地浏览器完成。
        </div>
    </div>
    <div class="footer">
        🧰 ACE 实验室 · 开源工具 | <a href="https://github.com/ace-trump-tech/html-lab" target="_blank">GitHub 仓库</a> &nbsp;| <a href="../"><strong>← 返回首页</strong></a>
    </div>
</div>
<div id="toastMsg" class="toast-msg">✨ 已复制</div>

<script>
(function() {
    const inputTa = document.getElementById('inputText');
    const outputPre = document.getElementById('outputPre');
    const toast = document.getElementById('toastMsg');
    let toastTimer = null;

    function showToast(msg, isErr) {
        if (toastTimer) clearTimeout(toastTimer);
        toast.textContent = msg;
        toast.style.background = isErr ? '#be123c' : '#0f172a';
        toast.style.opacity = '1';
        toastTimer = setTimeout(function() { toast.style.opacity = '0'; }, 1800);
    }

    function syntaxHighlight(json) {
        return json.replace(/("(?:\\.|[^"\\])*")\s*:/g, '<span class="json-key">$1</span>:')
            .replace(/:\s*("(?:\\.|[^"\\])*")/g, ': <span class="json-string">$1</span>')
            .replace(/:\s*(\d+\.?\d*)/g, ': <span class="json-number">$1</span>')
            .replace(/:\s*(true|false)/g, ': <span class="json-boolean">$1</span>')
            .replace(/:\s*(null)/g, ': <span class="json-null">$1</span>');
    }

    function doFormat() {
        var val = inputTa.value.trim();
        if (!val) { outputPre.innerHTML = '<span class="error-msg">⚠️ 输入为空</span>'; return; }
        try {
            var obj = JSON.parse(val);
            var formatted = JSON.stringify(obj, null, 2);
            outputPre.innerHTML = syntaxHighlight(formatted);
        } catch (e) {
            outputPre.innerHTML = '<span class="error-msg">❌ JSON 解析错误：' + e.message + '</span>';
        }
    }

    function doMinify() {
        var val = inputTa.value.trim();
        if (!val) { outputPre.innerHTML = '<span class="error-msg">⚠️ 输入为空</span>'; return; }
        try {
            var obj = JSON.parse(val);
            outputPre.textContent = JSON.stringify(obj);
        } catch (e) {
            outputPre.innerHTML = '<span class="error-msg">❌ JSON 解析错误：' + e.message + '</span>';
        }
    }

    function doValidate() {
        var val = inputTa.value.trim();
        if (!val) { outputPre.innerHTML = '<span class="error-msg">⚠️ 输入为空</span>'; return; }
        try {
            var obj = JSON.parse(val);
            var type = Array.isArray(obj) ? '数组 (Array)' : typeof obj === 'object' && obj !== null ? '对象 (Object)' : typeof obj;
            outputPre.innerHTML = '<span class="success-msg">✅ 有效的 JSON，顶层类型：' + type + '，键/元素数量：' + (Array.isArray(obj) ? obj.length : Object.keys(obj).length) + '</span>';
        } catch (e) {
            var posMatch = e.message.match(/position\s+(\d+)/);
            var msg = '❌ 无效的 JSON：' + e.message;
            if (posMatch) {
                var pos = parseInt(posMatch[1]);
                var ctx = val.substring(Math.max(0, pos - 20), Math.min(val.length, pos + 20));
                msg += '\n出错位置附近：...' + ctx + '...';
            }
            outputPre.innerHTML = '<span class="error-msg">' + msg.replace(/\n/g, '<br>') + '</span>';
        }
    }

    function doEscape() {
        var val = inputTa.value;
        if (!val) { outputPre.innerHTML = '<span class="error-msg">⚠️ 输入为空</span>'; return; }
        outputPre.textContent = JSON.stringify(val);
    }

    function doUnescape() {
        var val = inputTa.value.trim();
        if (!val) { outputPre.innerHTML = '<span class="error-msg">⚠️ 输入为空</span>'; return; }
        try {
            var obj = JSON.parse(val);
            outputPre.textContent = typeof obj === 'string' ? obj : JSON.stringify(obj, null, 2);
        } catch (e) {
            outputPre.innerHTML = '<span class="error-msg">❌ 无法去转义：' + e.message + '</span>';
        }
    }

    function doCopy() {
        var text = outputPre.textContent;
        if (!text) { showToast('⚠️ 没有可复制的内容', true); return; }
        navigator.clipboard.writeText(text).then(function() {
            showToast('📋 结果已复制');
        }).catch(function() {
            var ta = document.createElement('textarea');
            ta.value = text; document.body.appendChild(ta);
            ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
            showToast('📋 结果已复制 (fallback)');
        });
    }

    function doClear() {
        inputTa.value = '';
        outputPre.innerHTML = '';
        showToast('🧹 已清空');
    }

    document.getElementById('formatBtn').addEventListener('click', doFormat);
    document.getElementById('minifyBtn').addEventListener('click', doMinify);
    document.getElementById('validateBtn').addEventListener('click', doValidate);
    document.getElementById('escapeBtn').addEventListener('click', doEscape);
    document.getElementById('unescapeBtn').addEventListener('click', doUnescape);
    document.getElementById('copyBtn').addEventListener('click', doCopy);
    document.getElementById('clearBtn').addEventListener('click', doClear);
    inputTa.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); doFormat(); }
    });
})();
</script>
</body>
</html>
