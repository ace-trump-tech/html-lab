<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>大小写转换 | 在线工具</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; }
        body { background: linear-gradient(145deg, #f5f7fc 0%, #e9eef5 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; margin: 0; }
        .card { max-width: 1100px; width: 100%; background: rgba(255,255,255,0.92); backdrop-filter: blur(2px); border-radius: 2rem; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: #0f172a; padding: 1.2rem 2rem; color: white; }
        .header h1 { margin: 0; font-size: 1.8rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .badge { background: #2dd4bf20; border-radius: 40px; padding: 0.2rem 0.8rem; font-size: 0.8rem; border: 1px solid #2dd4bf50; }
        .container { padding: 2rem; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .btn { background: white; border: 1px solid #cbd5e1; padding: 10px 18px; border-radius: 60px; font-weight: 500; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .btn-primary { background: #0f172a; border-color: #0f172a; color: white; }
        .btn-primary:hover { background: #1e293b; transform: translateY(-1px); }
        .btn-outline:hover { background: #f1f5f9; }
        .row-2col { display: flex; flex-wrap: wrap; gap: 1.5rem; }
        .col { flex: 1; min-width: 280px; }
        .label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; font-weight: 600; color: #0f172a; }
        textarea { width: 100%; padding: 1rem; font-family: 'SF Mono', 'Cascadia Code', monospace; font-size: 0.9rem; border: 1px solid #cbd5e1; border-radius: 1.2rem; background: white; resize: vertical; line-height: 1.5; }
        textarea:focus { outline: none; border-color: #0f172a; box-shadow: 0 0 0 3px #0f172a20; }
        .footer { background: #f1f5f9; padding: 1rem 2rem; text-align: center; font-size: 0.8rem; color: #475569; border-top: 1px solid #e2e8f0; }
        .footer a { color: #15607a; text-decoration: none; }
        .toast-msg { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 8px 20px; border-radius: 40px; font-size: 0.8rem; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; }
        @media (max-width: 680px) { .container { padding: 1.2rem; } .btn { padding: 6px 12px; font-size: 0.8rem; } }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>🔠 大小写转换 <span class="badge">UPPER · lower · Title</span></h1>
        <p>快速转换文本大小写：全大写、全小写、首字母大写、驼峰命名等</p>
    </div>
    <div class="container">
        <div class="toolbar">
            <button class="btn btn-primary" data-mode="upper">🔺 全大写 (UPPER)</button>
            <button class="btn btn-primary" data-mode="lower">🔻 全小写 (lower)</button>
            <button class="btn btn-primary" data-mode="title">📝 首字母大写 (Title)</button>
            <button class="btn btn-outline" data-mode="sentence">📄 句首大写</button>
            <button class="btn btn-outline" data-mode="camel">🐪 驼峰命名 (camelCase)</button>
            <button class="btn btn-outline" data-mode="pascal">🐫 帕斯卡 (PascalCase)</button>
            <button class="btn btn-outline" data-mode="snake">🐍 蛇形 (snake_case)</button>
            <button class="btn btn-outline" data-mode="kebab">🥙 短横 (kebab-case)</button>
            <button class="btn btn-outline" id="swapBtn">⇄ 交换</button>
            <button class="btn btn-outline" id="copyBtn">📋 复制</button>
            <button class="btn btn-outline" id="clearBtn">🗑️ 清空</button>
        </div>
        <div class="row-2col">
            <div class="col">
                <div class="label"><span>📝 输入文本</span></div>
                <textarea id="inputText" rows="8" placeholder="输入要转换的文本...&#10;例如：hello world example"></textarea>
            </div>
            <div class="col">
                <div class="label"><span>✨ 输出结果</span></div>
                <textarea id="outputText" rows="8" readonly placeholder="转换后的结果..."></textarea>
            </div>
        </div>
    </div>
    <div class="footer">🧰 ACE 实验室 · 开源工具 | <a href="https://github.com/ace-trump-tech/html-lab" target="_blank">GitHub 仓库</a> &nbsp;| <a href="../"><strong>← 返回首页</strong></a></div>
</div>
<div id="toastMsg" class="toast-msg">✨ 已转换</div>
<script>
(function() {
    var inputTa = document.getElementById('inputText');
    var outputTa = document.getElementById('outputText');
    var toast = document.getElementById('toastMsg');
    var toastTimer = null;
    function showToast(msg, isErr) { if (toastTimer) clearTimeout(toastTimer); toast.textContent = msg; toast.style.background = isErr ? '#be123c' : '#0f172a'; toast.style.opacity = '1'; toastTimer = setTimeout(function() { toast.style.opacity = '0'; }, 1800); }

    function toCamel(text) { return text.toLowerCase().replace(/[^a-z0-9]+(.)/g, function(_, c) { return c.toUpperCase(); }).replace(/^[^a-z]*/, ''); }
    function toPascal(text) { var c = toCamel(text); return c.charAt(0).toUpperCase() + c.slice(1); }
    function toSnake(text) { return text.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, ''); }
    function toKebab(text) { return text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); }
    function toSentence(text) { return text.replace(/(^\w|[.!?]\s+\w)/g, function(c) { return c.toUpperCase(); }); }

    var modes = {
        upper: function(t) { return t.toUpperCase(); },
        lower: function(t) { return t.toLowerCase(); },
        title: function(t) { return t.replace(/\b\w/g, function(c) { return c.toUpperCase(); }); },
        sentence: toSentence,
        camel: toCamel,
        pascal: toPascal,
        snake: toSnake,
        kebab: toKebab
    };

    function applyMode(mode) {
        var val = inputTa.value;
        if (!val.trim()) { outputTa.value = '⚠️ 输入为空'; return; }
        outputTa.value = modes[mode](val);
    }

    document.querySelectorAll('[data-mode]').forEach(function(btn) {
        btn.addEventListener('click', function() { applyMode(this.dataset.mode); showToast('✅ 已转换：' + this.textContent.trim()); });
    });
    document.getElementById('swapBtn').addEventListener('click', function() { var t = inputTa.value; inputTa.value = outputTa.value; outputTa.value = t; showToast('🔄 已交换'); });
    document.getElementById('copyBtn').addEventListener('click', function() {
        var text = outputTa.value; if (!text) { showToast('⚠️ 没有可复制的内容', true); return; }
        navigator.clipboard.writeText(text).then(function() { showToast('📋 已复制'); });
    });
    document.getElementById('clearBtn').addEventListener('click', function() { inputTa.value = ''; outputTa.value = ''; showToast('🧹 已清空'); });
})();
</script>
</body>
</html>
