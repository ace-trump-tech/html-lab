<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>图片水印 | 在线工具</title>
    <style>*{box-sizing:border-box;font-family:system-ui,'Segoe UI',sans-serif}body{background:linear-gradient(145deg,#f5f7fc,#e9eef5);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;margin:0}.card{max-width:800px;width:100%;background:rgba(255,255,255,.92);border-radius:2rem;box-shadow:0 20px 35px -12px rgba(0,0,0,.2);overflow:hidden}.header{background:#0f172a;padding:1.2rem 2rem;color:#fff}.header h1{margin:0;font-size:1.6rem;display:flex;align-items:center;gap:12px}.badge{background:#2dd4bf20;border-radius:40px;padding:.2rem .8rem;font-size:.8rem;border:1px solid #2dd4bf50}.container{padding:2rem}.upload-area{border:2px dashed #cbd5e1;border-radius:1.5rem;padding:1.2rem;text-align:center;margin-bottom:1rem;cursor:pointer}.upload-area:hover{border-color:#0f172a;background:#f8fafc}.upload-area input{display:none}.config-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:1rem;align-items:flex-end}.config-row label{font-size:.8rem;color:#64748b;font-weight:600;display:block}.config-row input,.config-row select{padding:6px 10px;border:1px solid #cbd5e1;border-radius:.6rem;font-size:.9rem}.preview{text-align:center;display:none;margin:1rem 0}.preview img{max-width:100%;max-height:300px;border-radius:1rem;border:1px solid #e2e8f0}.btn{padding:10px 20px;border-radius:60px;font-weight:500;cursor:pointer;transition:.2s;font-size:.9rem;background:#fff;border:1px solid #cbd5e1}.btn-primary{background:#0f172a;color:#fff;border-color:#0f172a}.btn-primary:hover{background:#1e293b}.toolbar{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}.footer{background:#f1f5f9;padding:1rem 2rem;text-align:center;font-size:.8rem;color:#475569;border-top:1px solid #e2e8f0}.footer a{color:#15607a;text-decoration:none}</style>
</head>
<body>
<div class="card">
    <div class="header"><h1>💧 图片水印 <span class="badge">文字水印 · Canvas</span></h1><p style="margin:2px 0 0;font-size:.8rem;opacity:.8">给图片添加文字水印，可自定义文字、位置、透明度</p></div>
    <div class="container">
        <div class="upload-area" id="uploadArea">📁 点击或拖拽上传图片<input type="file" id="fileInput" accept="image/*"></div>
        <div class="config-row">
            <div><label>水印文字</label><input type="text" id="wmText" value="© My Watermark" style="width:180px;"></div>
            <div><label>位置</label><select id="wmPos"><option value="br">右下</option><option value="bl">左下</option><option value="tr">右上</option><option value="tl">左上</option><option value="center">居中</option></select></div>
            <div><label>透明度</label><input type="range" id="wmOpacity" min="10" max="90" value="40" style="width:80px;"></div>
            <div><label>字号</label><input type="number" id="wmSize" value="32" min="10" max="100" style="width:60px;"></div>
        </div>
        <div class="preview" id="previewBox"><img id="previewImg"></div>
        <div class="toolbar">
            <button class="btn btn-primary" id="applyBtn">💧 添加水印</button>
            <button class="btn" id="downloadBtn">⬇️ 下载</button>
        </div>
    </div>
    <div class="footer">🧰 ACE 实验室 · 开源工具 | <a href="https://github.com/ace-trump-tech/html-lab" target="_blank">GitHub 仓库</a> &nbsp;| <a href="../"><strong>← 返回首页</strong></a></div>
</div>
<script>
(function(){
    var img=null,watermarkedUrl=null;
    document.getElementById('uploadArea').addEventListener('click',function(){document.getElementById('fileInput').click()});
    document.getElementById('uploadArea').addEventListener('dragover',function(e){e.preventDefault()});
    document.getElementById('uploadArea').addEventListener('drop',function(e){e.preventDefault();if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0])});
    document.getElementById('fileInput').addEventListener('change',function(){if(this.files[0])loadFile(this.files[0])});

    function loadFile(file){
        var r=new FileReader();
        r.onload=function(e){img=new Image();img.onload=function(){applyWatermark()};img.src=e.target.result};
        r.readAsDataURL(file);
    }
    function applyWatermark(){
        if(!img)return;
        var c=document.createElement('canvas');c.width=img.width;c.height=img.height;
        var ctx=c.getContext('2d');ctx.drawImage(img,0,0);
        var text=document.getElementById('wmText').value;
        var pos=document.getElementById('wmPos').value;
        var opacity=parseInt(document.getElementById('wmOpacity').value)/100;
        var size=parseInt(document.getElementById('wmSize').value);
        ctx.font='bold '+size+'px system-ui';ctx.fillStyle='rgba(255,255,255,'+opacity+')';ctx.strokeStyle='rgba(0,0,0,'+opacity+')';ctx.lineWidth=2;
        var m=ctx.measureText(text);var tw=m.width,th=size;var pad=20;
        var x,y;
        if(pos==='br'){x=c.width-tw-pad;y=c.height-pad;}
        else if(pos==='bl'){x=pad;y=c.height-pad;}
        else if(pos==='tr'){x=c.width-tw-pad;y=th+pad;}
        else if(pos==='tl'){x=pad;y=th+pad;}
        else{x=(c.width-tw)/2;y=(c.height-th)/2;}
        ctx.strokeText(text,x,y);ctx.fillText(text,x,y);
        watermarkedUrl=c.toDataURL();
        document.getElementById('previewImg').src=watermarkedUrl;
        document.getElementById('previewBox').style.display='block';
    }
    document.getElementById('applyBtn').addEventListener('click',applyWatermark);
    document.getElementById('wmText').addEventListener('input',applyWatermark);
    document.getElementById('wmPos').addEventListener('change',applyWatermark);
    document.getElementById('wmOpacity').addEventListener('input',applyWatermark);
    document.getElementById('wmSize').addEventListener('input',applyWatermark);
    document.getElementById('downloadBtn').addEventListener('click',function(){
        if(!watermarkedUrl)return;
        var a=document.createElement('a');a.href=watermarkedUrl;a.download='watermarked.png';a.click();
    });
})();
</script>
</body>
</html>
