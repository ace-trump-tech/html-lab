<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>二维码解析 | 在线工具</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; }
        body { background: linear-gradient(145deg, #f5f7fc 0%, #e9eef5 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; margin: 0; }
        .card { max-width: 700px; width: 100%; background: rgba(255,255,255,0.92); backdrop-filter: blur(2px); border-radius: 2rem; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: #0f172a; padding: 1.2rem 2rem; color: white; }
        .header h1 { margin: 0; font-size: 1.8rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .badge { background: #2dd4bf20; border-radius: 40px; padding: 0.2rem 0.8rem; font-size: 0.8rem; border: 1px solid #2dd4bf50; }
        .container { padding: 2rem; }
        .upload-area { border: 2px dashed #cbd5e1; border-radius: 1.5rem; padding: 1.5rem; text-align: center; margin-bottom: 1rem; cursor: pointer; transition: 0.2s; }
        .upload-area:hover { border-color: #0f172a; background: #f8fafc; }
        .upload-area input[type="file"] { display: none; }
        .result-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 1rem; padding: 1.2rem; margin-top: 1rem; }
        .result-label { font-size: 0.8rem; color: #64748b; }
        .result-value { font-size: 1.1rem; color: #0f172a; word-break: break-all; font-family: 'SF Mono', monospace; margin-top: 4px; font-weight: 600; }
        .result-value a { color: #15607a; }
        .btn { background: white; border: 1px solid #cbd5e1; padding: 10px 20px; border-radius: 60px; font-weight: 500; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .btn-primary { background: #0f172a; border-color: #0f172a; color: white; }
        .btn-primary:hover { background: #1e293b; }
        .btn-outline:hover { background: #f1f5f9; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 0.5rem; }
        .footer { background: #f1f5f9; padding: 1rem 2rem; text-align: center; font-size: 0.8rem; color: #475569; border-top: 1px solid #e2e8f0; }
        .footer a { color: #15607a; text-decoration: none; }
        .toast-msg { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 8px 20px; border-radius: 40px; font-size: 0.8rem; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; }
        canvas { display: none; }
        .preview { text-align: center; margin-bottom: 0.5rem; display: none; }
        .preview img { max-width: 100%; max-height: 250px; border-radius: 1rem; border: 1px solid #e2e8f0; }
        @media (max-width: 680px) { .container { padding: 1.2rem; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>📱 二维码解析 <span class="badge">QR Decoder · jsQR</span></h1>
        <p>上传含二维码的图片，解析出其中编码的文本或网址</p>
    </div>
    <div class="container">
        <div class="upload-area" id="uploadArea">
            📁 点击或拖拽上传含二维码的图片
            <input type="file" id="fileInput" accept="image/*">
        </div>
        <div class="preview" id="previewBox"><img id="previewImg"></div>
        <div class="result-card" id="resultCard" style="display:none;">
            <div class="result-label">📋 解析结果</div>
            <div class="result-value" id="resultText">-</div>
            <div id="resultType" style="font-size:0.8rem;color:#64748b;margin-top:4px;"></div>
        </div>
        <div class="toolbar">
            <button class="btn btn-outline" id="copyBtn">📋 复制结果</button>
            <button class="btn btn-outline" id="openBtn" style="display:none;">🔗 打开链接</button>
        </div>
    </div>
    <div class="footer">🧰 ACE 实验室 · 开源工具 | <a href="https://github.com/ace-trump-tech/html-lab" target="_blank">GitHub 仓库</a></div>
</div>
<div id="toastMsg" class="toast-msg">✅ 解析完成</div>
<script>
(function() {
    var canvas = document.createElement('canvas');
    var ctx = canvas.getContext('2d');
    var toast = document.getElementById('toastMsg');
    var toastTimer = null;
    function showToast(msg, isErr) { if (toastTimer) clearTimeout(toastTimer); toast.textContent = msg; toast.style.background = isErr ? '#be123c' : '#0f172a'; toast.style.opacity = '1'; toastTimer = setTimeout(function() { toast.style.opacity = '0'; }, 1500); }

    document.getElementById('uploadArea').addEventListener('click', function() { document.getElementById('fileInput').click(); });
    document.getElementById('uploadArea').addEventListener('dragover', function(e) { e.preventDefault(); });
    document.getElementById('uploadArea').addEventListener('drop', function(e) { e.preventDefault(); if (e.dataTransfer.files[0]) decodeFile(e.dataTransfer.files[0]); });
    document.getElementById('fileInput').addEventListener('change', function() { if (this.files[0]) decodeFile(this.files[0]); });

    function decodeFile(file) {
        var reader = new FileReader();
        reader.onload = function(e) {
            var img = new Image();
            img.onload = function() {
                canvas.width = img.width; canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                var code = jsQR(imageData.data, canvas.width, canvas.height);
                document.getElementById('previewImg').src = e.target.result;
                document.getElementById('previewBox').style.display = 'block';
                if (code) {
                    document.getElementById('resultText').textContent = code.data;
                    document.getElementById('resultType').textContent = '位置: (' + code.location.topLeftCorner.x + ', ' + code.location.topLeftCorner.y + ')';
                    document.getElementById('resultCard').style.display = 'block';
                    document.getElementById('copyBtn').style.display = '';
                    var isUrl = /^https?:\/\//.test(code.data);
                    document.getElementById('openBtn').style.display = isUrl ? '' : 'none';
                    if (isUrl) document.getElementById('openBtn').onclick = function() { window.open(code.data, '_blank'); };
                    showToast('✅ 解析成功');
                } else {
                    document.getElementById('resultText').textContent = '未检测到二维码';
                    document.getElementById('resultType').textContent = '';
                    document.getElementById('resultCard').style.display = 'block';
                    document.getElementById('openBtn').style.display = 'none';
                    showToast('⚠️ 未检测到二维码', true);
                }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    document.getElementById('copyBtn').addEventListener('click', function() {
        var text = document.getElementById('resultText').textContent;
        if (!text || text === '未检测到二维码') { showToast('⚠️ 无内容可复制', true); return; }
        navigator.clipboard.writeText(text).then(function() { showToast('📋 已复制'); });
    });
})();
</script>
</body>
</html>
