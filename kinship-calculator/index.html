<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>亲戚称呼计算器 | 在线工具</title>
    <style>
        *{box-sizing:border-box;font-family:system-ui,'Segoe UI',sans-serif}
        body{background:linear-gradient(145deg,#f5f7fc,#e9eef5);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;margin:0}
        .card{max-width:650px;width:100%;background:rgba(255,255,255,.92);border-radius:2rem;box-shadow:0 20px 35px -12px rgba(0,0,0,.2);overflow:hidden}
        .header{background:#0f172a;padding:1.2rem 2rem;color:#fff}
        .header h1{margin:0;font-size:1.6rem;display:flex;align-items:center;gap:12px}
        .badge{background:#2dd4bf20;border-radius:40px;padding:.2rem .8rem;font-size:.8rem;border:1px solid #2dd4bf50}
        .container{padding:2rem}
        .chain-row{display:flex;flex-wrap:wrap;align-items:center;gap:4px 8px;margin-bottom:1.5rem;font-size:1rem}
        .chain-row span{color:#64748b;font-weight:600}
        .chain-row select{padding:8px 12px;border:1px solid #cbd5e1;border-radius:.8rem;font-size:.95rem;background:#fff;cursor:pointer;min-width:90px;font-weight:500}
        .chain-row select:focus{outline:none;border-color:#0f172a;box-shadow:0 0 0 2px #0f172a20}
        .gender-toggle{display:flex;gap:10px;margin-bottom:1.2rem}
        .gender-btn{padding:8px 24px;border-radius:60px;border:1px solid #cbd5e1;background:#fff;cursor:pointer;font-size:.9rem;font-weight:500;transition:0.15s}
        .gender-btn.active{background:#0f172a;color:#fff;border-color:#0f172a}
        .result-box{background:#1e293b;border-radius:1.2rem;padding:1.5rem;text-align:center}
        .result-box .label{color:#94a3b8;font-size:.85rem;margin-bottom:4px}
        .result-box .call{font-size:2.5rem;color:#2dd4bf;font-weight:700}
        .result-box .explain{color:#94a3b8;font-size:.85rem;margin-top:6px}
        .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.2rem;justify-content:center}
        .tag-btn{padding:4px 14px;border-radius:20px;border:1px solid #cbd5e1;background:#fff;cursor:pointer;font-size:.8rem;transition:0.15s}
        .tag-btn:hover{background:#f1f5f9}
        .tag-btn.active-tag{background:#0f172a;color:#fff;border-color:#0f172a}
        .footer{background:#f1f5f9;padding:1rem 2rem;text-align:center;font-size:.8rem;color:#475569;border-top:1px solid #e2e8f0}
        .footer a{color:#15607a;text-decoration:none}
        @media(max-width:500px){.chain-row{font-size:.9rem}.chain-row select{min-width:70px;padding:6px 8px;font-size:.85rem}}
    </style>
</head>
<body>
<div class="card">
    <div class="header"><h1>👨‍👩‍👧‍👦 亲戚称呼计算器 <span class="badge">链式推算</span></h1><p style="margin:2px 0 0;font-size:.8rem;opacity:.8">从"我"出发，一步步选择关系链，自动算出最终称呼</p></div>
    <div class="container">
        <div class="gender-toggle">
            <span style="line-height:2.4;font-weight:600;color:#0f172a;margin-right:8px;">我的性别：</span>
            <button class="gender-btn active" data-g="male">👨 男</button>
            <button class="gender-btn" data-g="female">👩 女</button>
        </div>
        <div class="chain-row" id="chainRow">
            <span>我的</span>
            <select class="chain-sel"><option value="">--</option></select>
        </div>
        <div class="btn-row" style="margin-bottom:1.5rem;">
            <button class="tag-btn" id="resetBtn">🔄 重新开始</button>
            <button class="tag-btn" id="removeLastBtn">↩ 撤销一步</button>
        </div>
        <div class="result-box">
            <div class="label">🫂 你该叫对方</div>
            <div class="call" id="callResult">-</div>
            <div class="explain" id="explainResult">请选择关系链</div>
        </div>
    </div>
    <div class="footer">🧰 ACE 实验室 · 开源工具 | <a href="https://github.com/ace-trump-tech/html-lab" target="_blank">GitHub 仓库</a> &nbsp;| <a href="../"><strong>← 返回首页</strong></a></div>
</div>
<script>
(function(){
    var myGender='male';
    var chain=[]; // array of relation keys

    // Relations you can select from a given person
    var relOptions=[
        {k:'father',v:'爸爸'},{k:'mother',v:'妈妈'},
        {k:'older_brother',v:'哥哥'},{k:'younger_brother',v:'弟弟'},
        {k:'older_sister',v:'姐姐'},{k:'younger_sister',v:'妹妹'},
        {k:'husband',v:'丈夫'},{k:'wife',v:'妻子'},
        {k:'son',v:'儿子'},{k:'daughter',v:'女儿'}
    ];

    // Process a single relation step: given a person's info and a relation, return the target person's info
    // info: {gender:'male'|'female', relationPath:[]} - relationPath describes how this person relates to ME
    function step(info, relKey){
        var g=info.gender;
        var rp=info.relationPath;
        switch(relKey){
            case 'father':   return {gender:'male',   relationPath:rp.concat(['father'])};
            case 'mother':   return {gender:'female', relationPath:rp.concat(['mother'])};
            case 'husband':  return {gender:'male',   relationPath:rp.concat(['husband'])};
            case 'wife':     return {gender:'female', relationPath:rp.concat(['wife'])};
            case 'son':      return {gender:'male',   relationPath:rp.concat(['son'])};
            case 'daughter': return {gender:'female', relationPath:rp.concat(['daughter'])};
            case 'older_brother':
            case 'younger_brother':
                return {gender:'male', relationPath:rp.concat([relKey])};
            case 'older_sister':
            case 'younger_sister':
                return {gender:'female', relationPath:rp.concat([relKey])};
        }
        return info;
    }

    // Recursive resolver: given what we call current person, and their gender, apply a relation step
    // Returns {name, gender} for the new person
    function applyRelation(curName, curGender, relKey){
        // Build a transition map
        var map={};

        // Helper: define transition from a known position
        function def(fromName, fromG, rel, toName, toG){
            var k=fromName+'|'+rel;
            map[k]=map[k]||{};
            map[k][fromG||'*']={n:toName,g:toG};
        }
        function defG(fromName, fromG, rel, toName, toG){
            var k=fromName+'|'+rel;
            map[k]=map[k]||{};
            map[k][fromG]={n:toName,g:toG};
        }

        var M='male',F='female',B='*';

        // ====== 直系亲属 ======
        def('我',B,'father','爸爸',M); def('我',B,'mother','妈妈',F);
        def('我',B,'husband','老公',M); def('我',B,'wife','老婆',F);
        def('我',B,'older_brother','哥哥',M); def('我',B,'younger_brother','弟弟',M);
        def('我',B,'older_sister','姐姐',F); def('我',B,'younger_sister','妹妹',F);
        def('我',B,'son','儿子',M); def('我',B,'daughter','女儿',F);

        // Parents
        def('爸爸',M,'father','爷爷',M); def('爸爸',M,'mother','奶奶',F);
        def('爸爸',M,'older_brother','伯父',M); def('爸爸',M,'younger_brother','叔叔',M);
        def('爸爸',M,'older_sister','大姑',F); def('爸爸',M,'younger_sister','小姑',F);
        def('爸爸',M,'husband','爸爸',M); def('爸爸',M,'wife','妈妈',F);
        def('妈妈',F,'father','外公',M); def('妈妈',F,'mother','外婆',F);
        def('妈妈',F,'older_brother','大舅',M); def('妈妈',F,'younger_brother','小舅',M);
        def('妈妈',F,'older_sister','大姨',F); def('妈妈',F,'younger_sister','小姨',F);

        // Grandfathers
        def('爷爷',M,'father','曾祖父',M); def('爷爷',M,'mother','曾祖母',F);
        def('爷爷',M,'older_brother','大爷爷',M); def('爷爷',M,'younger_brother','小爷爷',M);
        def('爷爷',M,'older_sister','姑奶奶',F); def('爷爷',M,'younger_sister','姑奶奶',F);
        def('奶奶',F,'father','外曾祖父',M); def('奶奶',F,'mother','外曾祖母',F);
        def('奶奶',F,'older_brother','舅公',M); def('奶奶',F,'younger_brother','舅公',M);
        def('外公',M,'father','外曾祖父',M); def('外公',M,'mother','外曾祖母',F);
        def('外公',M,'older_brother','大外公',M); def('外公',M,'younger_brother','小外公',M);
        def('外公',M,'older_sister','姨婆',F); def('外公',M,'younger_sister','姨婆',F);
        def('外婆',F,'father','外曾祖父',M); def('外婆',F,'mother','外曾祖母',F);
        def('外婆',F,'older_brother','舅公',M); def('外婆',F,'younger_brother','舅公',M);
        def('外婆',F,'older_sister','姨婆',F); def('外婆',F,'younger_sister','姨婆',F);

        // Great-grandparents
        def('曾祖父',M,'father','高祖父',M); def('曾祖父',M,'mother','高祖母',F);
        def('曾祖父',M,'older_brother','曾伯祖父',M); def('曾祖父',M,'younger_brother','曾叔祖父',M);
        def('曾祖母',F,'father','高外祖父',M); def('曾祖母',F,'mother','高外祖母',F);
        def('外曾祖父',M,'father','高外祖父',M); def('外曾祖父',M,'mother','高外祖母',F);
        def('外曾祖母',F,'father','高外曾祖父',M); def('外曾祖母',F,'mother','高外曾祖母',F);

        // Great-grandfathers (symmetric for both paternal and maternal)
        def('高祖父',M,'father','天祖',M); def('高祖父',M,'mother','天祖母',F);

        // ====== 叔伯姑舅姨 ======
        // From 伯父
        def('伯父',M,'son',B,'堂兄弟',M); def('伯父',M,'daughter',B,'堂姐妹',F);
        def('伯父',M,'father','爷爷',M); def('伯父',M,'mother','奶奶',F);
        def('伯父',M,'wife','伯母',F);
        def('伯母',F,'husband','伯父',M);
        // From 叔叔
        def('叔叔',M,'son',B,'堂兄弟',M); def('叔叔',M,'daughter',B,'堂姐妹',F);
        def('叔叔',M,'father','爷爷',M); def('叔叔',M,'mother','奶奶',F);
        def('叔叔',M,'wife','婶婶',F);
        def('婶婶',F,'husband','叔叔',M);
        // From 姑姑
        def('大姑',F,'son',B,'表兄弟',M); def('大姑',F,'daughter',B,'表姐妹',F);
        def('小姑',F,'son',B,'表兄弟',M); def('小姑',F,'daughter',B,'表姐妹',F);
        def('大姑',F,'husband','姑父',M); def('小姑',F,'husband','姑父',M);
        def('大姑',F,'father','爷爷',M); def('大姑',F,'mother','奶奶',F);
        def('小姑',F,'father','爷爷',M); def('小姑',F,'mother','奶奶',F);
        def('姑父',M,'wife',B,'姑',F);

        // From 舅舅
        def('大舅',M,'son',B,'表兄弟',M); def('大舅',M,'daughter',B,'表姐妹',F);
        def('小舅',M,'son',B,'表兄弟',M); def('小舅',M,'daughter',B,'表姐妹',F);
        def('大舅',M,'wife','舅妈',F); def('小舅',M,'wife','舅妈',F);
        def('大舅',M,'father','外公',M); def('小舅',M,'father','外公',M);
        def('大舅',M,'mother','外婆',F); def('小舅',M,'mother','外婆',F);
        def('舅妈',F,'husband',B,'舅',M);
        // From 姨妈
        def('大姨',F,'son',B,'表兄弟',M); def('大姨',F,'daughter',B,'表姐妹',F);
        def('小姨',F,'son',B,'表兄弟',M); def('小姨',F,'daughter',B,'表姐妹',F);
        def('大姨',F,'husband','姨父',M); def('小姨',F,'husband','姨父',M);
        def('大姨',F,'father','外公',M); def('小姨',F,'father','外公',M);
        def('大姨',F,'mother','外婆',F); def('小姨',F,'mother','外婆',F);
        def('姨父',M,'wife',B,'姨',F);

        // ====== 爷爷/奶奶的兄弟姐妹 (从爷爷视角) ======
        def('大爷爷',M,'son',B,'堂伯/堂叔',M); def('大爷爷',M,'daughter',B,'堂姑',F);
        def('小爷爷',M,'son',B,'堂伯/堂叔',M); def('小爷爷',M,'daughter',B,'堂姑',F);
        def('姑奶奶',F,'son',B,'表伯/表叔',M); def('姑奶奶',F,'daughter',B,'表姑',F);
        def('舅公',M,'son',B,'表舅',M); def('舅公',M,'daughter',B,'表姨',F);
        def('姨婆',F,'son',B,'表舅',M); def('姨婆',F,'daughter',B,'表姨',F);
        def('大外公',M,'son',B,'堂舅',M); def('大外公',M,'daughter',B,'堂姨',F);
        def('小外公',M,'son',B,'堂舅',M); def('小外公',M,'daughter',B,'堂姨',F);

        // ====== 兄弟姐妹的子女 ======
        def('哥哥',M,'son',B,'侄子',M); def('哥哥',M,'daughter',B,'侄女',F);
        def('哥哥',M,'wife','嫂子',F);
        def('弟弟',M,'son',B,'侄子',M); def('弟弟',M,'daughter',B,'侄女',F);
        def('弟弟',M,'wife','弟媳',F);
        def('姐姐',F,'son',B,'外甥',M); def('姐姐',F,'daughter',B,'外甥女',F);
        def('姐姐',F,'husband','姐夫',M);
        def('妹妹',F,'son',B,'外甥',M); def('妹妹',F,'daughter',B,'外甥女',F);
        def('妹妹',F,'husband','妹夫',M);
        def('嫂子',F,'husband','哥哥',M);
        def('弟媳',F,'husband','弟弟',M);
        def('姐夫',M,'wife','姐姐',F);
        def('妹夫',M,'wife','妹妹',F);

        // 侄子/外甥的下一代
        def('侄子',M,'son',B,'侄孙',M); def('侄子',M,'daughter',B,'侄孙女',F);
        def('侄女',F,'son',B,'外侄孙',M); def('侄女',F,'daughter',B,'外侄孙女',F);
        def('外甥',M,'son',B,'外甥孙',M); def('外甥',M,'daughter',B,'外甥孙女',F);
        def('外甥女',F,'son',B,'外甥外孙',M); def('外甥女',F,'daughter',B,'外甥外孙女',F);

        // ====== 堂/表兄弟姐妹 ======
        def('堂兄弟',M,'father',B,'伯父/叔叔',M);
        def('堂兄弟',M,'son',B,'堂侄',M); def('堂兄弟',M,'daughter',B,'堂侄女',F);
        def('表兄弟',M,'father',B,'舅/姨父',M);
        def('表兄弟',M,'son',B,'表侄',M); def('表兄弟',M,'daughter',B,'表侄女',F);
        def('堂姐妹',F,'father',B,'伯父/叔叔',M);
        def('表姐妹',F,'father',B,'舅/姨父',M);

        // ====== 配偶 ======
        def('老公',M,'father','公公',M); def('老公',M,'mother','婆婆',F);
        def('老公',M,'older_brother','大伯子',M); def('老公',M,'younger_brother','小叔子',M);
        def('老公',M,'older_sister','大姑子',F); def('老公',M,'younger_sister','小姑子',F);
        def('老婆',F,'father','岳父',M); def('老婆',F,'mother','岳母',F);
        def('老婆',F,'older_brother','大舅子',M); def('老婆',F,'younger_brother','小舅子',M);
        def('老婆',F,'older_sister','大姨子',F); def('老婆',F,'younger_sister','小姨子',F);

        // 公婆岳父母
        def('公公',M,'father','太公公',M); def('公公',M,'mother','太婆婆',F);
        def('婆婆',F,'father','外太公公',M); def('婆婆',F,'mother','外太婆婆',F);
        def('岳父',M,'father','太岳父',M); def('岳父',M,'mother','太岳母',F);
        def('岳母',F,'father','外太岳父',M); def('岳母',F,'mother','外太岳母',F);
        def('公公',M,'older_brother','伯公公',M); def('公公',M,'younger_brother','叔公公',M);
        def('婆婆',F,'older_sister','大婆婆',F); def('婆婆',F,'younger_sister','小婆婆',F);
        def('岳父',M,'older_brother','伯岳父',M); def('岳父',M,'younger_brother','叔岳父',M);
        def('岳母',F,'older_sister','大岳母',F); def('岳母',F,'younger_sister','小岳母',F);

        // 配偶的兄弟姐妹
        def('大伯子',M,'son',B,'侄辈',M); def('大伯子',M,'wife','妯娌',F);
        def('小叔子',M,'son',B,'侄辈',M); def('小叔子',M,'wife','妯娌',F);
        def('大姑子',F,'son',B,'外甥辈',M); def('大姑子',F,'husband','姑爷',M);
        def('小姑子',F,'son',B,'外甥辈',M); def('小姑子',F,'husband','姑爷',M);
        def('大舅子',M,'son',B,'外甥辈',M); def('大舅子',M,'wife','舅嫂',F);
        def('小舅子',M,'son',B,'外甥辈',M); def('小舅子',M,'wife','舅嫂',F);
        def('大姨子',F,'son',B,'外甥辈',M); def('大姨子',F,'husband','连襟',M);
        def('小姨子',F,'son',B,'外甥辈',M); def('小姨子',F,'husband','连襟',M);

        // ====== 子女的配偶 ======
        def('儿子',M,'wife','儿媳',F); def('儿子',M,'son',B,'孙子',M); def('儿子',M,'daughter',B,'孙女',F);
        def('女儿',F,'husband','女婿',M); def('女儿',F,'son',B,'外孙',M); def('女儿',F,'daughter',B,'外孙女',F);
        def('儿媳',F,'husband','儿子',M); def('儿媳',F,'father','亲家公',M); def('儿媳',F,'mother','亲家母',F);
        def('女婿',M,'wife','女儿',F); def('女婿',M,'father','亲家公',M); def('女婿',M,'mother','亲家母',F);
        // Grandchildren
        def('孙子',M,'father','儿子',M); def('孙子',M,'mother','儿媳',F);
        def('孙女',F,'father','儿子',M); def('孙女',F,'mother','儿媳',F);
        def('外孙',M,'father','女婿',M); def('外孙',M,'mother','女儿',F);
        def('外孙女',F,'father','女婿',M); def('外孙女',F,'mother','女儿',F);

        // ====== Fallback for common ancestors (parents/children of unknown) ======
        function fallback(curName, curGender, relKey){
            // Generic fallback based on gender patterns
            if(relKey==='father'){
                // For a female curPerson, this person is "curPerson的父亲"
                // The title depends on who curPerson is relative to us
                return {n:curName+'的父亲',g:M};
            }
            if(relKey==='mother') return {n:curName+'的母亲',g:F};
            if(relKey==='husband') return {n:curName+'的丈夫',g:M};
            if(relKey==='wife') return {n:curName+'的妻子',g:F};
            if(relKey==='son') return {n:curName+'的儿子',g:M};
            if(relKey==='daughter') return {n:curName+'的女儿',g:F};
            if(relKey==='older_brother'||relKey==='younger_brother') return {n:curName+'的兄弟',g:M};
            if(relKey==='older_sister'||relKey==='younger_sister') return {n:curName+'的姐妹',g:F};
            return {n:'未知',g:B};
        }

        var key=curName+'|'+relKey;
        var entry=map[key];
        if(entry){
            // Try gender-specific first, then wildcard
            if(entry[curGender]) return entry[curGender];
            if(entry[B]) return entry[B];
            // Try any
            var keys=Object.keys(entry);
            if(keys.length>0) return entry[keys[0]];
        }
        return fallback(curName, curGender, relKey);
    }

    function resolveCall(finalGender, pathStr){
        if(!chain.length) return {c:'-',e:'请选择关系链'};
        var cur={n:'我',g:myGender};
        for(var i=0;i<chain.length;i++){
            var relKey=chain[i];
            // Remove older/younger prefix for lookup
            var lookupKey=relKey.replace(/_older|_younger/g,'');
            cur=applyRelation(cur.n, cur.g, relKey);
            // if not found with specific prefix, try generic
            if(!cur||cur.n.indexOf('的')>=0){
                // try generic lookup
                cur=applyRelation(cur.n.split('的')[0], cur.g, lookupKey)||cur;
            }
        }
        if(!cur||cur.n==='未知') return {c:'不清楚',e:'这个关系链暂无称呼数据，可尝试更短的路径'};
        // Build explanation
        var explainParts=[];
        var tmp={n:'我',g:myGender};
        for(var j=0;j<chain.length;j++){
            var rk=chain[j];
            var rn=relOptions.find(function(o){return o.k===rk});
            var label=rn?rn.v:rk;
            explainParts.push(label);
        }
        var e=explainParts.join(' → ');
        // Clean up display name
        var displayName=cur.n.replace(/_older/g,'').replace(/_younger/g,'');
        return {c:displayName,e:e};
    }

    function updateChainUI(){
        var row=document.getElementById('chainRow');
        var html='<span>我的</span>';
        for(var i=0;i<=chain.length;i++){
            if(i>0){
                var selected=chain[i-1];
                html+='<span>的</span>';
                html+='<select class="chain-sel" data-idx="'+(i-1)+'"><option value="">--</option>';
                // show options for a person
                relOptions.forEach(function(o){
                    var sel=selected===o.k?' selected':'';
                    html+='<option value="'+o.k+'"'+sel+'>'+o.v+'</option>';
                });
                html+='</select>';
            }
            if(i===chain.length){
                html+='<span>的</span>';
                html+='<select class="chain-sel" data-idx="new"><option value="">--</option>';
                relOptions.forEach(function(o){
                    html+='<option value="'+o.k+'">'+o.v+'</option>';
                });
                html+='</select>';
            }
        }
        row.innerHTML=html;
        bindSelects();
        updateResult();
    }

    function bindSelects(){
        document.querySelectorAll('.chain-sel').forEach(function(sel){
            sel.addEventListener('change',function(){
                var idx=this.dataset.idx;
                var val=this.value;
                if(idx==='new'){
                    if(val)chain.push(val);
                }else{
                    var i=parseInt(idx);
                    if(val){
                        chain[i]=val;
                        // remove anything after
                        chain=chain.slice(0,i+1);
                    }else{
                        chain=chain.slice(0,i);
                    }
                }
                updateChainUI();
            });
        });
    }

    function updateResult(){
        if(chain.length===0){
            document.getElementById('callResult').textContent='-';
            document.getElementById('explainResult').textContent='请选择关系链';
            return;
        }
        var pathStr=chain.join('_');
        var res=resolveCall('',pathStr);
        document.getElementById('callResult').textContent=res.c;
        document.getElementById('explainResult').textContent=res.e;
    }

    // Gender toggle
    document.querySelectorAll('.gender-btn').forEach(function(b){
        b.addEventListener('click',function(){
            document.querySelectorAll('.gender-btn').forEach(function(x){x.classList.remove('active')});
            this.classList.add('active');
            myGender=this.dataset.g;
            updateResult();
        });
    });

    document.getElementById('resetBtn').addEventListener('click',function(){chain=[];updateChainUI()});
    document.getElementById('removeLastBtn').addEventListener('click',function(){chain.pop();updateChainUI()});

    updateChainUI();
})();
</script>
</body>
</html>
