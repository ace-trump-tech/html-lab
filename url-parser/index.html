<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>URL 解析器 | 在线工具</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; }
        body { background: linear-gradient(145deg, #f5f7fc 0%, #e9eef5 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; margin: 0; }
        .card { max-width: 800px; width: 100%; background: rgba(255,255,255,0.92); backdrop-filter: blur(2px); border-radius: 2rem; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: #0f172a; padding: 1.2rem 2rem; color: white; }
        .header h1 { margin: 0; font-size: 1.8rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .badge { background: #2dd4bf20; border-radius: 40px; padding: 0.2rem 0.8rem; font-size: 0.8rem; border: 1px solid #2dd4bf50; }
        .container { padding: 2rem; }
        label { display: block; font-weight: 600; color: #0f172a; margin-bottom: 6px; }
        textarea { width: 100%; padding: 0.8rem 1rem; font-family: 'SF Mono', 'Cascadia Code', monospace; font-size: 0.9rem; border: 1px solid #cbd5e1; border-radius: 1rem; background: white; resize: vertical; line-height: 1.5; }
        textarea:focus { outline: none; border-color: #0f172a; box-shadow: 0 0 0 3px #0f172a20; }
        .result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.7rem; margin-top: 1rem; }
        .prop-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 0.8rem; padding: 0.7rem; }
        .prop-card .prop-name { font-size: 0.7rem; color: #64748b; font-family: 'SF Mono', monospace; text-transform: uppercase; }
        .prop-card .prop-value { font-size: 0.9rem; color: #0f172a; word-break: break-all; font-family: 'SF Mono', monospace; margin-top: 2px; }
        .btn { background: white; border: 1px solid #cbd5e1; padding: 10px 20px; border-radius: 60px; font-weight: 500; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .btn-primary { background: #0f172a; border-color: #0f172a; color: white; }
        .btn-primary:hover { background: #1e293b; transform: translateY(-1px); }
        .btn-outline:hover { background: #f1f5f9; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 0.8rem; justify-content: center; }
        .footer { background: #f1f5f9; padding: 1rem 2rem; text-align: center; font-size: 0.8rem; color: #475569; border-top: 1px solid #e2e8f0; }
        .footer a { color: #15607a; text-decoration: none; }
        .toast-msg { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 8px 20px; border-radius: 40px; font-size: 0.8rem; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; }
        @media (max-width: 680px) { .container { padding: 1.2rem; } }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>🔗 URL 解析器 <span class="badge">Protocol · Host · Query</span></h1>
        <p>解析 URL 的各个组成部分：协议、主机、路径、查询参数、片段等</p>
    </div>
    <div class="container">
        <label>🔗 输入 URL</label>
        <textarea id="urlInput" rows="2" placeholder="粘贴 URL 地址...&#10;例如：https://user:pass@example.com:8080/path/to/page?q=hello&lang=zh#section"></textarea>
        <div class="toolbar">
            <button class="btn btn-primary" id="parseBtn">🔍 解析</button>
            <button class="btn btn-outline" id="clearBtn">🗑️ 清空</button>
        </div>
        <div class="result-grid" id="resultGrid"></div>
    </div>
    <div class="footer">🧰 ACE 实验室 · 开源工具 | <a href="https://github.com/ace-trump-tech/html-lab" target="_blank">GitHub 仓库</a> &nbsp;| <a href="../"><strong>← 返回首页</strong></a></div>
</div>
<div id="toastMsg" class="toast-msg">✅ 解析完成</div>
<script>
(function() {
    var resultGrid = document.getElementById('resultGrid');
    var toast = document.getElementById('toastMsg');
    var toastTimer = null;
    function showToast(msg) { if (toastTimer) clearTimeout(toastTimer); toast.textContent = msg; toast.style.background = '#0f172a'; toast.style.opacity = '1'; toastTimer = setTimeout(function() { toast.style.opacity = '0'; }, 1500); }

    function doParse() {
        var val = document.getElementById('urlInput').value.trim();
        if (!val) { resultGrid.innerHTML = '<div style="color:#94a3b8;grid-column:1/-1;text-align:center;">等待输入 URL...</div>'; return; }
        try {
            var u = new URL(val);
            var props = [
                ['href', u.href],
                ['protocol', u.protocol],
                ['host', u.host],
                ['hostname', u.hostname],
                ['port', u.port || '(默认)'],
                ['pathname', u.pathname],
                ['search', u.search || '(无)'],
                ['hash', u.hash || '(无)'],
                ['origin', u.origin],
                ['username', u.username || '(无)'],
                ['password', u.password ? '***' : '(无)']
            ];
            var html = '';
            props.forEach(function(p) {
                html += '<div class="prop-card"><div class="prop-name">' + p[0] + '</div><div class="prop-value">' + p[1] + '</div></div>';
            });
            // Query params
            var params = u.searchParams;
            var paramItems = [];
            params.forEach(function(v, k) { paramItems.push(k + ' = ' + v); });
            if (paramItems.length > 0) {
                html += '<div class="prop-card" style="grid-column:1/-1;"><div class="prop-name">📋 查询参数 (Query Params)</div><div class="prop-value">' + paramItems.join('<br>') + '</div></div>';
            }
            resultGrid.innerHTML = html;
        } catch(e) {
            resultGrid.innerHTML = '<div style="color:#b91c1c;grid-column:1/-1;">❌ 无效的 URL：' + e.message + '</div>';
        }
    }

    document.getElementById('parseBtn').addEventListener('click', function() { doParse(); showToast('✅ 解析完成'); });
    document.getElementById('clearBtn').addEventListener('click', function() {
        document.getElementById('urlInput').value = '';
        resultGrid.innerHTML = '<div style="color:#94a3b8;grid-column:1/-1;text-align:center;">已清空</div>';
        showToast('🧹 已清空');
    });
    document.getElementById('urlInput').addEventListener('keydown', function(e) { if ((e.ctrlKey||e.metaKey) && e.key==='Enter') { e.preventDefault(); doParse(); } });
    // Init with example
    document.getElementById('urlInput').value = 'https://user:pass@example.com:8080/path/to/page?q=hello&lang=zh#section';
    doParse();
})();
</script>
</body>
</html>
