<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>图片裁剪 | 在线工具</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; }
        body { background: linear-gradient(145deg, #f5f7fc 0%, #e9eef5 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; margin: 0; }
        .card { max-width: 900px; width: 100%; background: rgba(255,255,255,0.92); backdrop-filter: blur(2px); border-radius: 2rem; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: #0f172a; padding: 1.2rem 2rem; color: white; }
        .header h1 { margin: 0; font-size: 1.8rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .badge { background: #2dd4bf20; border-radius: 40px; padding: 0.2rem 0.8rem; font-size: 0.8rem; border: 1px solid #2dd4bf50; }
        .container { padding: 2rem; }
        .upload-area { border: 2px dashed #cbd5e1; border-radius: 1.5rem; padding: 1.5rem; text-align: center; margin-bottom: 1rem; cursor: pointer; transition: 0.2s; }
        .upload-area:hover { border-color: #0f172a; background: #f8fafc; }
        .upload-area input[type="file"] { display: none; }
        .workspace { position: relative; display: inline-block; margin: 0 auto 1rem; max-width: 100%; text-align: center; cursor: crosshair; user-select: none; }
        .workspace canvas { max-width: 100%; border-radius: 0.5rem; display: block; }
        .crop-overlay { position: absolute; border: 2px dashed #0f172a; background: rgba(15,23,42,0.15); pointer-events: none; }
        .btn { background: white; border: 1px solid #cbd5e1; padding: 10px 20px; border-radius: 60px; font-weight: 500; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .btn-primary { background: #0f172a; border-color: #0f172a; color: white; }
        .btn-primary:hover { background: #1e293b; transform: translateY(-1px); }
        .btn-outline:hover { background: #f1f5f9; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 0.5rem; }
        .info { text-align: center; font-size: 0.8rem; color: #64748b; margin-bottom: 0.5rem; }
        .footer { background: #f1f5f9; padding: 1rem 2rem; text-align: center; font-size: 0.8rem; color: #475569; border-top: 1px solid #e2e8f0; }
        .footer a { color: #15607a; text-decoration: none; }
        .toast-msg { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 8px 20px; border-radius: 40px; font-size: 0.8rem; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; }
        .workspace-wrap { text-align: center; display: none; }
        @media (max-width: 680px) { .container { padding: 1.2rem; } }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>✂️ 图片裁剪 <span class="badge">自由选区 · Canvas</span></h1>
        <p>上传图片，用鼠标拖拽选择裁剪区域，纯前端处理</p>
    </div>
    <div class="container">
        <div class="upload-area" id="uploadArea">
            📁 点击或拖拽上传图片
            <input type="file" id="fileInput" accept="image/*">
        </div>
        <div class="workspace-wrap" id="workspaceWrap">
            <div class="info" id="cropInfo">拖拽鼠标选择裁剪区域</div>
            <div class="workspace" id="workspace">
                <canvas id="mainCanvas"></canvas>
                <div class="crop-overlay" id="cropOverlay" style="display:none;"></div>
            </div>
        </div>
        <div class="toolbar">
            <button class="btn btn-primary" id="cropBtn">✂️ 裁剪并下载</button>
            <button class="btn btn-outline" id="resetBtn">🔄 重置选区</button>
        </div>
    </div>
    <div class="footer">🧰 ACE 实验室 · 开源工具 | <a href="https://github.com/ace-trump-tech/html-lab" target="_blank">GitHub 仓库</a></div>
</div>
<div id="toastMsg" class="toast-msg">✅ 完成</div>
<script>
(function() {
    var canvas = document.getElementById('mainCanvas');
    var ctx = canvas.getContext('2d');
    var workspace = document.getElementById('workspace');
    var overlay = document.getElementById('cropOverlay');
    var toast = document.getElementById('toastMsg');
    var toastTimer = null;
    var img = null, isDragging = false, startX = 0, startY = 0, rect = null;

    function showToast(msg, isErr) { if (toastTimer) clearTimeout(toastTimer); toast.textContent = msg; toast.style.background = isErr ? '#be123c' : '#0f172a'; toast.style.opacity = '1'; toastTimer = setTimeout(function() { toast.style.opacity = '0'; }, 1500); }

    document.getElementById('uploadArea').addEventListener('click', function() { document.getElementById('fileInput').click(); });
    document.getElementById('uploadArea').addEventListener('dragover', function(e) { e.preventDefault(); });
    document.getElementById('uploadArea').addEventListener('drop', function(e) { e.preventDefault(); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
    document.getElementById('fileInput').addEventListener('change', function() { if (this.files[0]) loadFile(this.files[0]); });

    function loadFile(file) {
        var reader = new FileReader();
        reader.onload = function(e) {
            img = new Image();
            img.onload = function() {
                var maxW = Math.min(img.width, 700);
                var scale = maxW / img.width;
                canvas.width = maxW;
                canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                document.getElementById('workspaceWrap').style.display = 'block';
                overlay.style.display = 'none';
                rect = null;
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    workspace.addEventListener('mousedown', function(e) {
        if (!img) return;
        var r = canvas.getBoundingClientRect();
        isDragging = true;
        startX = (e.clientX - r.left) * (canvas.width / r.width);
        startY = (e.clientY - r.top) * (canvas.height / r.height);
        overlay.style.display = 'block';
        overlay.style.left = '0px'; overlay.style.top = '0px';
        overlay.style.width = '0px'; overlay.style.height = '0px';
    });

    workspace.addEventListener('mousemove', function(e) {
        if (!isDragging) return;
        var r = canvas.getBoundingClientRect();
        var curX = (e.clientX - r.left) * (canvas.width / r.width);
        var curY = (e.clientY - r.top) * (canvas.height / r.height);
        var x = Math.min(startX, curX), y = Math.min(startY, curY);
        var w = Math.abs(curX - startX), h = Math.abs(curY - startY);
        x = Math.max(0, x); y = Math.max(0, y);
        if (x + w > canvas.width) w = canvas.width - x;
        if (y + h > canvas.height) h = canvas.height - y;
        var scaleX = r.width / canvas.width;
        var scaleY = r.height / canvas.height;
        overlay.style.left = (x * scaleX) + 'px';
        overlay.style.top = (y * scaleY) + 'px';
        overlay.style.width = (w * scaleX) + 'px';
        overlay.style.height = (h * scaleY) + 'px';
        rect = { x: x, y: y, w: w, h: h };
    });

    workspace.addEventListener('mouseup', function() { isDragging = false; if (rect && rect.w < 5 && rect.h < 5) rect = null; });
    workspace.addEventListener('mouseleave', function() { isDragging = false; });

    document.getElementById('cropBtn').addEventListener('click', function() {
        if (!img || !rect) { showToast('⚠️ 请先拖拽选择裁剪区域', true); return; }
        var cropCanvas = document.createElement('canvas');
        cropCanvas.width = rect.w; cropCanvas.height = rect.h;
        cropCanvas.getContext('2d').drawImage(canvas, rect.x, rect.y, rect.w, rect.h, 0, 0, rect.w, rect.h);
        cropCanvas.toBlob(function(blob) {
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'cropped.png'; a.click();
            showToast('📸 裁剪完成，已下载');
        });
    });

    document.getElementById('resetBtn').addEventListener('click', function() {
        overlay.style.display = 'none'; rect = null;
        showToast('🔄 选区已重置');
    });
})();
</script>
</body>
</html>
