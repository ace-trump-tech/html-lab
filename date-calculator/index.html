<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>日期计算器 | 在线工具</title>
    <style>*{box-sizing:border-box;font-family:system-ui,'Segoe UI',sans-serif}body{background:linear-gradient(145deg,#f5f7fc,#e9eef5);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;margin:0}.card{max-width:650px;width:100%;background:rgba(255,255,255,.92);border-radius:2rem;box-shadow:0 20px 35px -12px rgba(0,0,0,.2);overflow:hidden}.header{background:#0f172a;padding:1.2rem 2rem;color:#fff}.header h1{margin:0;font-size:1.6rem;display:flex;align-items:center;gap:12px}.badge{background:#2dd4bf20;border-radius:40px;padding:.2rem .8rem;font-size:.8rem;border:1px solid #2dd4bf50}.container{padding:2rem}.tab-row{display:flex;gap:8px;margin-bottom:1.2rem}.tab-btn{padding:8px 18px;border-radius:60px;border:1px solid #cbd5e1;background:#fff;cursor:pointer;font-size:.85rem;transition:.15s}.tab-btn.active{background:#0f172a;color:#fff;border-color:#0f172a}.row{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;margin-bottom:1rem}.row label{font-size:.8rem;color:#64748b;font-weight:600}.row input{padding:8px 10px;border:1px solid #cbd5e1;border-radius:.6rem;font-size:.9rem;font-family:'SF Mono',monospace}.result-box{background:#1e293b;border-radius:1rem;padding:1.2rem 1.5rem;color:#2dd4bf;font-size:1.2rem;min-height:50px;line-height:1.6}.btn{padding:10px 20px;border-radius:60px;font-weight:500;cursor:pointer;transition:.2s;font-size:.9rem;background:#0f172a;color:#fff;border:none}.btn:hover{background:#1e293b}.footer{background:#f1f5f9;padding:1rem 2rem;text-align:center;font-size:.8rem;color:#475569;border-top:1px solid #e2e8f0}.footer a{color:#15607a;text-decoration:none}
    @media(max-width:500px){.row{flex-direction:column;align-items:stretch}}</style>
</head>
<body>
<div class="card">
    <div class="header"><h1>📅 日期计算器 <span class="badge">差值 · 加减 · 推算</span></h1></div>
    <div class="container">
        <div class="tab-row">
            <button class="tab-btn active" data-tab="diff">📆 日期间隔</button>
            <button class="tab-btn" data-tab="add">➕ 日期加减</button>
        </div>
        <div id="tabDiff">
            <div class="row">
                <div><label>开始日期</label><input type="date" id="d1" value="2026-01-01"></div>
                <div><label>结束日期</label><input type="date" id="d2"></div>
                <button id="calcDiffBtn">计算</button>
            </div>
            <div class="result-box" id="diffResult">-</div>
        </div>
        <div id="tabAdd" style="display:none;">
            <div class="row">
                <div><label>基准日期</label><input type="date" id="dBase"></div>
                <div><label>天数 (+加 -减)</label><input type="number" id="dDays" value="30" style="width:80px;"></div>
                <button id="calcAddBtn">计算</button>
            </div>
            <div class="result-box" id="addResult">-</div>
        </div>
    </div>
    <div class="footer">🧰 ACE 实验室 · 开源工具 | <a href="https://github.com/ace-trump-tech/html-lab" target="_blank">GitHub 仓库</a> &nbsp;| <a href="../"><strong>← 返回首页</strong></a></div>
</div>
<script>
(function(){
    var today=new Date().toISOString().split('T')[0];
    document.getElementById('d2').value=today;
    document.getElementById('dBase').value=today;

    document.querySelectorAll('.tab-btn').forEach(function(b){b.addEventListener('click',function(){document.querySelectorAll('.tab-btn').forEach(function(x){x.classList.remove('active')});this.classList.add('active');document.getElementById('tabDiff').style.display=this.dataset.tab==='diff'?'block':'none';document.getElementById('tabAdd').style.display=this.dataset.tab==='add'?'block':'none';});});

    document.getElementById('calcDiffBtn').addEventListener('click',function(){
        var d1=new Date(document.getElementById('d1').value),d2=new Date(document.getElementById('d2').value);
        if(isNaN(d1)||isNaN(d2)){document.getElementById('diffResult').textContent='请选择日期';return;}
        var diff=Math.abs(d2-d1),days=Math.floor(diff/86400000);
        document.getElementById('diffResult').innerHTML='相差 <b>'+days+'</b> 天<br>'+Math.floor(days/7)+' 周 '+days%7+' 天<br>约 '+Math.round(days/30.44)+' 个月';
    });
    document.getElementById('calcAddBtn').addEventListener('click',function(){
        var d=new Date(document.getElementById('dBase').value),n=parseInt(document.getElementById('dDays').value)||0;
        if(isNaN(d)){document.getElementById('addResult').textContent='请选择日期';return;}
        d.setDate(d.getDate()+n);
        document.getElementById('addResult').innerHTML='结果：<b>'+d.toISOString().split('T')[0]+'</b><br>星期'+['日','一','二','三','四','五','六'][d.getDay()]+' | '+(d.getFullYear()%4===0?'闰年':'平年');
    });

    document.getElementById('calcDiffBtn').click();
})();
</script>
</body>
</html>
