<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>图片尺寸调整 | 在线工具</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; }
        body { background: linear-gradient(145deg, #f5f7fc 0%, #e9eef5 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; margin: 0; }
        .card { max-width: 800px; width: 100%; background: rgba(255,255,255,0.92); backdrop-filter: blur(2px); border-radius: 2rem; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: #0f172a; padding: 1.2rem 2rem; color: white; }
        .header h1 { margin: 0; font-size: 1.8rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .badge { background: #2dd4bf20; border-radius: 40px; padding: 0.2rem 0.8rem; font-size: 0.8rem; border: 1px solid #2dd4bf50; }
        .container { padding: 2rem; }
        .upload-area { border: 2px dashed #cbd5e1; border-radius: 1.5rem; padding: 1.5rem; text-align: center; margin-bottom: 1rem; cursor: pointer; transition: 0.2s; }
        .upload-area:hover { border-color: #0f172a; background: #f8fafc; }
        .upload-area input[type="file"] { display: none; }
        .config-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; margin-bottom: 1rem; justify-content: center; }
        .config-row label { font-size: 0.85rem; color: #0f172a; font-weight: 600; }
        .config-row input { width: 90px; padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 0.6rem; font-size: 0.9rem; text-align: center; font-family: 'SF Mono', monospace; }
        .config-row .sep { font-size: 0.9rem; color: #64748b; }
        .config-row .lock { cursor: pointer; font-size: 1.2rem; user-select: none; }
        .preset-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; justify-content: center; }
        .preset-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #cbd5e1; background: white; cursor: pointer; font-size: 0.8rem; transition: 0.15s; }
        .preset-btn:hover { background: #f1f5f9; }
        .preview-box { text-align: center; display: none; margin-bottom: 1rem; }
        .preview-box img { max-width: 100%; max-height: 250px; border-radius: 1rem; border: 1px solid #e2e8f0; }
        .info { font-size: 0.8rem; color: #64748b; margin-top: 4px; }
        .btn { background: white; border: 1px solid #cbd5e1; padding: 10px 20px; border-radius: 60px; font-weight: 500; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .btn-primary { background: #0f172a; border-color: #0f172a; color: white; }
        .btn-primary:hover { background: #1e293b; transform: translateY(-1px); }
        .btn-outline:hover { background: #f1f5f9; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .footer { background: #f1f5f9; padding: 1rem 2rem; text-align: center; font-size: 0.8rem; color: #475569; border-top: 1px solid #e2e8f0; }
        .footer a { color: #15607a; text-decoration: none; }
        .toast-msg { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 8px 20px; border-radius: 40px; font-size: 0.8rem; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; }
        @media (max-width: 680px) { .container { padding: 1.2rem; } }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>📐 图片尺寸调整 <span class="badge">宽高 · 等比例 · 预设</span></h1>
        <p>调整图片尺寸，支持按像素/百分比缩放，可保持宽高比</p>
    </div>
    <div class="container">
        <div class="upload-area" id="uploadArea">
            📁 点击或拖拽上传图片
            <input type="file" id="fileInput" accept="image/*">
        </div>
        <div class="preview-box" id="previewBox">
            <img id="previewImg"><div class="info" id="previewInfo"></div>
        </div>
        <div class="config-row">
            <label>宽度</label><input type="number" id="widthIn" value="800" min="1">
            <span class="sep">×</span>
            <label>高度</label><input type="number" id="heightIn" value="600" min="1">
            <span>px</span>
            <span class="lock" id="lockBtn" title="锁定宽高比">🔗</span>
        </div>
        <div class="config-row">
            <label>缩放百分比</label>
            <input type="range" id="percentSlide" min="10" max="200" value="100" style="flex:1;min-width:150px;accent-color:#0f172a;">
            <span id="percentVal" style="min-width:40px;text-align:right;">100%</span>
        </div>
        <div class="preset-row">
            <span style="font-size:0.8rem;color:#64748b;line-height:2;">预设：</span>
            <button class="preset-btn" data-w="1920" data-h="1080">1080p</button>
            <button class="preset-btn" data-w="800" data-h="600">800×600</button>
            <button class="preset-btn" data-w="400" data-h="300">400×300</button>
            <button class="preset-btn" data-w="200" data-h="200">200×200</button>
            <button class="preset-btn" data-w="1200" data-h="630">OG Image</button>
        </div>
        <div class="toolbar">
            <button class="btn btn-primary" id="resizeBtn">📐 调整并下载</button>
        </div>
    </div>
    <div class="footer">🧰 ACE 实验室 · 开源工具 | <a href="https://github.com/ace-trump-tech/html-lab" target="_blank">GitHub 仓库</a></div>
</div>
<div id="toastMsg" class="toast-msg">✅ 完成</div>
<script>
(function() {
    var img = null, origW = 0, origH = 0, ratioLocked = true;
    var toast = document.getElementById('toastMsg');
    var toastTimer = null;
    var widthIn = document.getElementById('widthIn');
    var heightIn = document.getElementById('heightIn');

    function showToast(msg, isErr) { if (toastTimer) clearTimeout(toastTimer); toast.textContent = msg; toast.style.background = isErr ? '#be123c' : '#0f172a'; toast.style.opacity = '1'; toastTimer = setTimeout(function() { toast.style.opacity = '0'; }, 1500); }

    document.getElementById('uploadArea').addEventListener('click', function() { document.getElementById('fileInput').click(); });
    document.getElementById('uploadArea').addEventListener('dragover', function(e) { e.preventDefault(); });
    document.getElementById('uploadArea').addEventListener('drop', function(e) { e.preventDefault(); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
    document.getElementById('fileInput').addEventListener('change', function() { if (this.files[0]) loadFile(this.files[0]); });

    function loadFile(file) {
        var reader = new FileReader();
        reader.onload = function(e) {
            img = new Image();
            img.onload = function() {
                origW = img.width; origH = img.height;
                widthIn.value = origW; heightIn.value = origH;
                document.getElementById('previewImg').src = e.target.result;
                document.getElementById('previewInfo').textContent = origW + ' × ' + origH;
                document.getElementById('previewBox').style.display = 'block';
                document.getElementById('percentSlide').value = 100;
                document.getElementById('percentVal').textContent = '100%';
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    document.getElementById('lockBtn').addEventListener('click', function() {
        ratioLocked = !ratioLocked;
        this.textContent = ratioLocked ? '🔗' : '🔓';
    });

    widthIn.addEventListener('input', function() {
        if (ratioLocked && origW && origH) {
            heightIn.value = Math.round(this.value * (origH / origW));
        }
    });
    heightIn.addEventListener('input', function() {
        if (ratioLocked && origW && origH) {
            widthIn.value = Math.round(this.value * (origW / origH));
        }
    });

    document.getElementById('percentSlide').addEventListener('input', function() {
        var pct = parseInt(this.value);
        document.getElementById('percentVal').textContent = pct + '%';
        if (origW && origH) {
            widthIn.value = Math.round(origW * pct / 100);
            heightIn.value = Math.round(origH * pct / 100);
        }
    });

    document.querySelectorAll('.preset-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var w = parseInt(this.dataset.w), h = parseInt(this.dataset.h);
            if (!origW || ratioLocked) { widthIn.value = w; heightIn.value = h; }
            else { widthIn.value = w; heightIn.value = h; }
        });
    });

    document.getElementById('resizeBtn').addEventListener('click', function() {
        if (!img) { showToast('⚠️ 请先上传图片', true); return; }
        var w = parseInt(widthIn.value), h = parseInt(heightIn.value);
        if (!w || !h || w < 1 || h < 1) { showToast('⚠️ 无效的尺寸', true); return; }
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(function(blob) {
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'resized.png'; a.click();
            showToast('📸 已调整并下载 (' + w + '×' + h + ')');
        });
    });
})();
</script>
</body>
</html>
