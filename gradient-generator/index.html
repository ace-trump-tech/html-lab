<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>渐变图制作 | 在线工具</title>
    <style>*{box-sizing:border-box;font-family:system-ui,'Segoe UI',sans-serif}body{background:linear-gradient(145deg,#f5f7fc,#e9eef5);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;margin:0}.card{max-width:650px;width:100%;background:rgba(255,255,255,.92);border-radius:2rem;box-shadow:0 20px 35px -12px rgba(0,0,0,.2);overflow:hidden}.header{background:#0f172a;padding:1.2rem 2rem;color:#fff}.header h1{margin:0;font-size:1.6rem;display:flex;align-items:center;gap:12px}.badge{background:#2dd4bf20;border-radius:40px;padding:.2rem .8rem;font-size:.8rem;border:1px solid #2dd4bf50}.container{padding:2rem}.preview-box{width:100%;height:200px;border-radius:1rem;margin-bottom:1rem;border:1px solid #e2e8f0}.color-row{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:.8rem}.color-row input[type="color"]{width:50px;height:50px;border:none;border-radius:.8rem;cursor:pointer;padding:0}.color-row .add-btn{padding:8px 16px;border-radius:20px;border:1px dashed #cbd5e1;background:white;cursor:pointer;font-size:.9rem}.type-row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}.type-btn{padding:6px 14px;border-radius:20px;font-size:.8rem;border:1px solid #cbd5e1;background:white;cursor:pointer}.type-btn.active{background:#0f172a;color:#fff;border-color:#0f172a}.css-output{background:#1e293b;border-radius:1rem;padding:1rem 1.2rem;color:#86efac;font-family:'SF Mono',monospace;font-size:.85rem;word-break:break-all}.btn{padding:10px 20px;border-radius:60px;font-weight:500;cursor:pointer;transition:.2s;font-size:.9rem;background:#fff;border:1px solid #cbd5e1}.btn-outline:hover{background:#f1f5f9}.toolbar{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:.8rem}.footer{background:#f1f5f9;padding:1rem 2rem;text-align:center;font-size:.8rem;color:#475569;border-top:1px solid #e2e8f0}.footer a{color:#15607a;text-decoration:none}</style>
</head>
<body>
<div class="card">
    <div class="header"><h1>🎨 渐变图制作 <span class="badge">CSS Gradient</span></h1><p style="margin:2px 0 0;font-size:.8rem;opacity:.8">可视化生成 CSS 渐变，支持线性/径向，可复制 CSS 代码</p></div>
    <div class="container">
        <div class="type-row">
            <button class="type-btn active" data-type="linear">📏 线性渐变</button>
            <button class="type-btn" data-type="radial">🔵 径向渐变</button>
        </div>
        <div class="preview-box" id="previewBox"></div>
        <div class="color-row" id="colorRow">
            <input type="color" value="#3b82f6"><input type="color" value="#8b5cf6"><button class="add-btn" id="addColorBtn">+ 添加颜色</button>
            <button class="add-btn" id="removeColorBtn" style="color:#b91c1c;">-</button>
        </div>
        <div class="color-row" style="gap:8px;">
            <label style="font-size:.8rem;">角度</label>
            <input type="range" id="angleSlide" min="0" max="360" value="90" style="width:100px;accent-color:#0f172a;">
            <span id="angleVal" style="font-family:'SF Mono',monospace;font-size:.8rem;">90°</span>
        </div>
        <div class="css-output" id="cssOutput">background: linear-gradient(90deg, #3b82f6, #8b5cf6);</div>
        <div class="toolbar">
            <button class="btn btn-outline" id="copyBtn">📋 复制 CSS</button>
            <button class="btn btn-outline" id="downloadBtn">⬇️ 下载图片</button>
        </div>
    </div>
    <div class="footer">🧰 ACE 实验室 · 开源工具 | <a href="https://github.com/ace-trump-tech/html-lab" target="_blank">GitHub 仓库</a> &nbsp;| <a href="../"><strong>← 返回首页</strong></a></div>
</div>
<script>
(function(){
    var gradType='linear',angle=90;
    function update(){
        var inputs=document.querySelectorAll('#colorRow input[type="color"]');
        var colors=[];inputs.forEach(function(inp){colors.push(inp.value)});
        var css;
        if(gradType==='linear'){css='linear-gradient('+angle+'deg, '+colors.join(', ')+')';}
        else{css='radial-gradient(circle, '+colors.join(', ')+')';}
        document.getElementById('previewBox').style.background=css;
        document.getElementById('cssOutput').textContent='background: '+css+';';
    }
    document.querySelectorAll('.type-btn').forEach(function(b){b.addEventListener('click',function(){document.querySelectorAll('.type-btn').forEach(function(x){x.classList.remove('active')});this.classList.add('active');gradType=this.dataset.type;update()});});
    document.getElementById('colorRow').addEventListener('input',function(e){if(e.target.type==='color')update()});
    document.getElementById('addColorBtn').addEventListener('click',function(){
        var inp=document.createElement('input');inp.type='color';inp.value='#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
        document.getElementById('colorRow').insertBefore(inp,document.getElementById('addColorBtn'));
        update();
    });
    document.getElementById('removeColorBtn').addEventListener('click',function(){
        var inputs=document.querySelectorAll('#colorRow input[type="color"]');
        if(inputs.length<=2)return;
        inputs[inputs.length-1].remove();update();
    });
    document.getElementById('angleSlide').addEventListener('input',function(){angle=parseInt(this.value);document.getElementById('angleVal').textContent=angle+'°';update()});
    document.getElementById('copyBtn').addEventListener('click',function(){navigator.clipboard.writeText(document.getElementById('cssOutput').textContent)});
    document.getElementById('downloadBtn').addEventListener('click',function(){
        var c=document.createElement('canvas');c.width=800;c.height=600;
        var ctx=c.getContext('2d');var grad;
        if(gradType==='linear'){var rad=angle*Math.PI/180;grad=ctx.createLinearGradient(400-Math.cos(rad)*400,300-Math.sin(rad)*300,400+Math.cos(rad)*400,300+Math.sin(rad)*300);}
        else{grad=ctx.createRadialGradient(400,300,0,400,300,400);}
        var inputs=document.querySelectorAll('#colorRow input[type="color"]');
        inputs.forEach(function(inp,i){grad.addColorStop(i/(inputs.length-1),inp.value)});
        ctx.fillStyle=grad;ctx.fillRect(0,0,800,600);
        var a=document.createElement('a');a.href=c.toDataURL();a.download='gradient.png';a.click();
    });
    update();
})();
</script>
</body>
</html>
