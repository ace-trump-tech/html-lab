<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BMI 计算器 | 在线工具</title>
    <style>*{box-sizing:border-box;font-family:system-ui,'Segoe UI',sans-serif}body{background:linear-gradient(145deg,#f5f7fc,#e9eef5);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;margin:0}.card{max-width:500px;width:100%;background:rgba(255,255,255,.92);border-radius:2rem;box-shadow:0 20px 35px -12px rgba(0,0,0,.2);overflow:hidden}.header{background:#0f172a;padding:1.2rem 2rem;color:#fff}.header h1{margin:0;font-size:1.6rem;display:flex;align-items:center;gap:12px}.badge{background:#2dd4bf20;border-radius:40px;padding:.2rem .8rem;font-size:.8rem;border:1px solid #2dd4bf50}.container{padding:2rem}.input-row{display:flex;gap:12px;align-items:flex-end;margin-bottom:1rem;flex-wrap:wrap}.input-row div{flex:1;min-width:120px}.input-row label{display:block;font-size:.8rem;color:#64748b;font-weight:600;margin-bottom:4px}.input-row input{padding:8px 10px;border:1px solid #cbd5e1;border-radius:.6rem;font-size:1rem;width:100%;font-family:'SF Mono',monospace;text-align:center}.input-row .unit{font-size:.85rem;color:#64748b;line-height:2.4}.result-card{text-align:center;margin:1.5rem 0}.bmi-value{font-size:3rem;font-weight:700;color:#0f172a;font-family:'SF Mono',monospace}.bmi-label{font-size:.9rem;color:#fff;padding:4px 16px;border-radius:20px;display:inline-block;margin-top:8px}.meter-bar{height:10px;background:#e2e8f0;border-radius:10px;margin-top:8px;overflow:hidden}.meter-fill{height:100%;border-radius:10px;transition:width .3s,background .3s}.info-row{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap}.info-chip{flex:1;min-width:80px;text-align:center;background:#f8fafc;padding:.5rem;border-radius:.8rem;border:1px solid #e2e8f0}.info-chip .val{font-size:1.1rem;font-weight:600;color:#0f172a}.info-chip .lbl{font-size:.7rem;color:#64748b}.btn{padding:10px 20px;border-radius:60px;font-weight:500;cursor:pointer;transition:.2s;font-size:.9rem;background:#fff;border:1px solid #cbd5e1}.btn-primary{background:#0f172a;color:#fff;border-color:#0f172a}.btn-primary:hover{background:#1e293b}.toolbar{display:flex;gap:10px;justify-content:center}.footer{background:#f1f5f9;padding:1rem 2rem;text-align:center;font-size:.8rem;color:#475569;border-top:1px solid #e2e8f0}.footer a{color:#15607a;text-decoration:none}</style>
</head>
<body>
<div class="card">
    <div class="header"><h1>⚖️ BMI 身体质量计算器 <span class="badge">体重指数</span></h1></div>
    <div class="container">
        <div class="input-row">
            <div><label>身高 (cm)</label><input type="number" id="height" value="170" min="50" max="250"></div>
            <div><label>体重 (kg)</label><input type="number" id="weight" value="65" min="20" max="300"></div>
        </div>
        <div class="result-card">
            <div class="bmi-value" id="bmiVal">-</div>
            <div class="bmi-label" id="bmiLabel">-</div>
            <div class="meter-bar"><div class="meter-fill" id="meterFill" style="width:0%"></div></div>
        </div>
        <div class="info-row">
            <div class="info-chip"><div class="val" id="idealWeight">-</div><div class="lbl">理想体重 (kg)</div></div>
            <div class="info-chip"><div class="val" id="bodyFat">-</div><div class="lbl">体脂估算 (%)</div></div>
        </div>
    </div>
    <div class="footer">🧰 ACE 实验室 · 开源工具 | <a href="https://github.com/ace-trump-tech/html-lab" target="_blank">GitHub 仓库</a> &nbsp;| <a href="../"><strong>← 返回首页</strong></a></div>
</div>
<script>
(function(){
    function calc(){
        var h=parseFloat(document.getElementById('height').value)/100;
        var w=parseFloat(document.getElementById('weight').value);
        if(!h||!w||h<=0||w<=0)return;
        var bmi=w/(h*h);
        document.getElementById('bmiVal').textContent=bmi.toFixed(1);
        var label,color,bgColor,width;
        if(bmi<18.5){label='偏瘦';color='#0284c7';bgColor='#e0f2fe';width=20;}
        else if(bmi<24){label='正常';color='#15803d';bgColor='#dcfce7';width=50;}
        else if(bmi<28){label='偏胖';color='#d97706';bgColor='#fef3c7';width=72;}
        else{label='肥胖';color='#b91c1c';bgColor='#fef2f2';width=90;}
        var el=document.getElementById('bmiLabel');el.textContent=label;el.style.background=bgColor;el.style.color=color;
        var m=document.getElementById('meterFill');m.style.width=width+'%';m.style.background=color;
        document.getElementById('idealWeight').textContent=(22*h*h).toFixed(1);
        document.getElementById('bodyFat').textContent=(1.2*bmi+0.23*25-5.4).toFixed(1);
    }
    document.getElementById('height').addEventListener('input',calc);
    document.getElementById('weight').addEventListener('input',calc);
    calc();
})();
</script>
</body>
</html>
