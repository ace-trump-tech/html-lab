<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HTML 实体编解码 | 在线工具</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; }
        body { background: linear-gradient(145deg, #f5f7fc 0%, #e9eef5 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; margin: 0; }
        .card { max-width: 1100px; width: 100%; background: rgba(255,255,255,0.92); backdrop-filter: blur(2px); border-radius: 2rem; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: #0f172a; padding: 1.2rem 2rem; color: white; }
        .header h1 { margin: 0; font-size: 1.8rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .badge { background: #2dd4bf20; border-radius: 40px; padding: 0.2rem 0.8rem; font-size: 0.8rem; border: 1px solid #2dd4bf50; }
        .container { padding: 2rem; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; justify-content: center; }
        .btn { background: white; border: 1px solid #cbd5e1; padding: 10px 20px; border-radius: 60px; font-weight: 500; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .btn-primary { background: #0f172a; border-color: #0f172a; color: white; }
        .btn-primary:hover { background: #1e293b; transform: translateY(-1px); }
        .btn-outline:hover { background: #f1f5f9; }
        .row-2col { display: flex; flex-wrap: wrap; gap: 1.5rem; margin-top: 0.5rem; }
        .col { flex: 1; min-width: 280px; }
        .label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; font-weight: 600; color: #0f172a; }
        textarea { width: 100%; padding: 1rem; font-family: 'SF Mono', 'Cascadia Code', monospace; font-size: 0.9rem; border: 1px solid #cbd5e1; border-radius: 1.2rem; background: white; resize: vertical; line-height: 1.5; }
        textarea:focus { outline: none; border-color: #0f172a; box-shadow: 0 0 0 3px #0f172a20; }
        .footer { background: #f1f5f9; padding: 1rem 2rem; text-align: center; font-size: 0.8rem; color: #475569; border-top: 1px solid #e2e8f0; }
        .footer a { color: #15607a; text-decoration: none; }
        .toast-msg { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 8px 20px; border-radius: 40px; font-size: 0.8rem; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; }
        .reference { font-size: 0.8rem; color: #64748b; margin-top: 0.8rem; background: #f8fafc; border-radius: 1rem; padding: 0.8rem 1rem; }
        .reference code { background: #e2e8f0; padding: 1px 5px; border-radius: 3px; font-size: 0.85rem; }
        @media (max-width: 680px) { .container { padding: 1.2rem; } .btn { padding: 6px 14px; } }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>🏷️ HTML 实体编解码 <span class="badge">&amp;lt; ⇄ &lt; · 纯前端</span></h1>
        <p>对 HTML 实体字符进行编码与解码，防止 XSS 攻击或还原转义字符</p>
    </div>
    <div class="container">
        <div class="toolbar">
            <button class="btn btn-primary" id="encodeBtn">🔒 编码 (文本 → 实体)</button>
            <button class="btn btn-primary" id="decodeBtn">🔓 解码 (实体 → 文本)</button>
            <button class="btn btn-outline" id="swapBtn">⇄ 交换内容</button>
            <button class="btn btn-outline" id="clearBtn">🗑️ 清空</button>
        </div>
        <div class="row-2col">
            <div class="col">
                <div class="label"><span>📝 输入区域</span><button class="btn" id="copyInputBtn" style="padding:4px 12px;font-size:0.75rem;">📋 复制</button></div>
                <textarea id="inputText" rows="8" placeholder="输入 HTML 代码或包含实体的文本...&#10;例如：&lt;div&gt;Hello&lt;/div&gt;"></textarea>
            </div>
            <div class="col">
                <div class="label"><span>✨ 输出结果</span><button class="btn" id="copyOutputBtn" style="padding:4px 12px;font-size:0.75rem;">📋 复制</button></div>
                <textarea id="outputText" rows="8" readonly placeholder="编解码后的结果..."></textarea>
            </div>
        </div>
        <div class="reference">
            💡 常用实体：<code>&amp;lt;</code> → &lt; &nbsp; <code>&amp;gt;</code> → &gt; &nbsp; <code>&amp;amp;</code> → &amp; &nbsp; <code>&amp;quot;</code> → &quot; &nbsp; <code>&amp;#39;</code> → &#39; &nbsp; <code>&amp;nbsp;</code> → 空格
        </div>
    </div>
    <div class="footer">🧰 ACE 实验室 · 开源工具 | <a href="https://github.com/ace-trump-tech/html-lab" target="_blank">GitHub 仓库</a> &nbsp;| <a href="../"><strong>← 返回首页</strong></a></div>
</div>
<div id="toastMsg" class="toast-msg">✨ 已复制</div>
<script>
(function() {
    var inputTa = document.getElementById('inputText');
    var outputTa = document.getElementById('outputText');
    var toast = document.getElementById('toastMsg');
    var toastTimer = null;
    function showToast(msg, isErr) {
        if (toastTimer) clearTimeout(toastTimer);
        toast.textContent = msg; toast.style.background = isErr ? '#be123c' : '#0f172a';
        toast.style.opacity = '1'; toastTimer = setTimeout(function() { toast.style.opacity = '0'; }, 1800);
    }
    function doEncode() {
        var val = inputTa.value; if (!val) { outputTa.value = '⚠️ 输入为空'; return; }
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(val));
        outputTa.value = div.innerHTML;
    }
    function doDecode() {
        var val = inputTa.value.trim(); if (!val) { outputTa.value = '⚠️ 输入为空'; return; }
        var div = document.createElement('div');
        div.innerHTML = val;
        outputTa.value = div.textContent;
    }
    function copyText(text, label) {
        if (!text) { showToast('⚠️ 没有可复制的内容', true); return; }
        navigator.clipboard.writeText(text).then(function() { showToast('📋 ' + label + '已复制'); })
            .catch(function() { var ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast('📋 ' + label + '已复制 (fallback)'); });
    }
    document.getElementById('encodeBtn').addEventListener('click', doEncode);
    document.getElementById('decodeBtn').addEventListener('click', doDecode);
    document.getElementById('swapBtn').addEventListener('click', function() { var t = inputTa.value; inputTa.value = outputTa.value; outputTa.value = t; showToast('🔄 已交换'); });
    document.getElementById('clearBtn').addEventListener('click', function() { inputTa.value = ''; outputTa.value = ''; showToast('🧹 已清空'); });
    document.getElementById('copyInputBtn').addEventListener('click', function() { copyText(inputTa.value, '输入内容'); });
    document.getElementById('copyOutputBtn').addEventListener('click', function() { copyText(outputTa.value, '输出内容'); });
    inputTa.addEventListener('keydown', function(e) { if ((e.ctrlKey||e.metaKey) && e.key==='Enter') { e.preventDefault(); doEncode(); } });
})();
</script>
</body>
</html>
