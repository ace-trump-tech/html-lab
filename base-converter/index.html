<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>进制转换 | 在线工具</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; }
        body { background: linear-gradient(145deg, #f5f7fc 0%, #e9eef5 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; margin: 0; }
        .card { max-width: 800px; width: 100%; background: rgba(255,255,255,0.92); backdrop-filter: blur(2px); border-radius: 2rem; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: #0f172a; padding: 1.2rem 2rem; color: white; }
        .header h1 { margin: 0; font-size: 1.8rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .badge { background: #2dd4bf20; border-radius: 40px; padding: 0.2rem 0.8rem; font-size: 0.8rem; border: 1px solid #2dd4bf50; }
        .container { padding: 2rem; }
        .conv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.2rem; }
        .conv-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 1rem; padding: 1rem; text-align: center; }
        .conv-card label { display: block; font-size: 0.75rem; color: #64748b; margin-bottom: 4px; font-family: 'SF Mono', monospace; }
        .conv-card input { width: 100%; padding: 6px 8px; font-family: 'SF Mono', monospace; font-size: 0.9rem; border: 1px solid #cbd5e1; border-radius: 0.6rem; text-align: center; }
        .conv-card input:focus { outline: none; border-color: #0f172a; box-shadow: 0 0 0 2px #0f172a20; }
        .btn { background: white; border: 1px solid #cbd5e1; padding: 10px 20px; border-radius: 60px; font-weight: 500; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .btn-outline:hover { background: #f1f5f9; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .footer { background: #f1f5f9; padding: 1rem 2rem; text-align: center; font-size: 0.8rem; color: #475569; border-top: 1px solid #e2e8f0; }
        .footer a { color: #15607a; text-decoration: none; }
        .toast-msg { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 8px 20px; border-radius: 40px; font-size: 0.8rem; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; }
        @media (max-width: 680px) { .container { padding: 1.2rem; } }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>🔢 进制转换 <span class="badge">2/8/10/16 · 纯前端</span></h1>
        <p>二进制、八进制、十进制、十六进制互相转换，实时联动更新</p>
    </div>
    <div class="container">
        <div class="conv-grid">
            <div class="conv-card"><label>二进制 (BIN)</label><input type="text" id="binInput" placeholder="0/1"></div>
            <div class="conv-card"><label>八进制 (OCT)</label><input type="text" id="octInput" placeholder="0-7"></div>
            <div class="conv-card"><label>十进制 (DEC)</label><input type="text" id="decInput" placeholder="0-9"></div>
            <div class="conv-card"><label>十六进制 (HEX)</label><input type="text" id="hexInput" placeholder="0-F"></div>
        </div>
        <div class="toolbar">
            <button class="btn btn-outline" id="copyAllBtn">📋 复制全部</button>
            <button class="btn btn-outline" id="clearBtn">🗑️ 清空</button>
        </div>
    </div>
    <div class="footer">🧰 ACE 实验室 · 开源工具 | <a href="https://github.com/ace-trump-tech/html-lab" target="_blank">GitHub 仓库</a> &nbsp;| <a href="../"><strong>← 返回首页</strong></a></div>
</div>
<div id="toastMsg" class="toast-msg">📋 已复制</div>
<script>
(function() {
    var binIn = document.getElementById('binInput');
    var octIn = document.getElementById('octInput');
    var decIn = document.getElementById('decInput');
    var hexIn = document.getElementById('hexInput');
    var toast = document.getElementById('toastMsg');
    var toastTimer = null;
    var updating = false;
    function showToast(msg) { if (toastTimer) clearTimeout(toastTimer); toast.textContent = msg; toast.style.background = '#0f172a'; toast.style.opacity = '1'; toastTimer = setTimeout(function() { toast.style.opacity = '0'; }, 1500); }

    function updateAll(val, base) {
        if (updating) return;
        updating = true;
        var num = parseInt(val, base);
        if (isNaN(num)) { updating = false; return; }
        binIn.value = num.toString(2);
        octIn.value = num.toString(8);
        decIn.value = num.toString(10);
        hexIn.value = num.toString(16).toUpperCase();
        updating = false;
    }
    binIn.addEventListener('input', function() { updateAll(this.value.replace(/[^01]/g,''), 2); });
    octIn.addEventListener('input', function() { updateAll(this.value.replace(/[^0-7]/g,''), 8); });
    decIn.addEventListener('input', function() { updateAll(this.value.replace(/[^0-9]/g,''), 10); });
    hexIn.addEventListener('input', function() { updateAll(this.value.replace(/[^0-9a-fA-F]/g,''), 16); });

    document.getElementById('copyAllBtn').addEventListener('click', function() {
        var text = 'BIN: ' + (binIn.value||'') + '\nOCT: ' + (octIn.value||'') + '\nDEC: ' + (decIn.value||'') + '\nHEX: ' + (hexIn.value||'');
        if (!binIn.value && !octIn.value && !decIn.value && !hexIn.value) { showToast('⚠️ 请先输入数值'); return; }
        navigator.clipboard.writeText(text).then(function() { showToast('📋 已复制全部'); });
    });
    document.getElementById('clearBtn').addEventListener('click', function() { binIn.value=''; octIn.value=''; decIn.value=''; hexIn.value=''; showToast('🧹 已清空'); });
    // Init with example
    decIn.value = '255'; updateAll('255', 10);
})();
</script>
</body>
</html>
