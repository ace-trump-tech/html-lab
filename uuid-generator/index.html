<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>UUID 生成器 | 在线工具</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; }
        body { background: linear-gradient(145deg, #f5f7fc 0%, #e9eef5 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; margin: 0; }
        .card { max-width: 800px; width: 100%; background: rgba(255,255,255,0.92); backdrop-filter: blur(2px); border-radius: 2rem; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: #0f172a; padding: 1.2rem 2rem; color: white; }
        .header h1 { margin: 0; font-size: 1.8rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .badge { background: #2dd4bf20; border-radius: 40px; padding: 0.2rem 0.8rem; font-size: 0.8rem; border: 1px solid #2dd4bf50; }
        .container { padding: 2rem; }
        .current-uuid { background: #1e293b; border-radius: 1.2rem; padding: 1.2rem 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 12px; }
        .current-uuid span { flex: 1; color: #2dd4bf; font-family: 'SF Mono', monospace; font-size: 1.1rem; word-break: break-all; }
        .btn { background: white; border: 1px solid #cbd5e1; padding: 10px 20px; border-radius: 60px; font-weight: 500; cursor: pointer; transition: 0.2s; font-size: 0.9rem; white-space: nowrap; }
        .btn-primary { background: #0f172a; border-color: #0f172a; color: white; }
        .btn-primary:hover { background: #1e293b; transform: translateY(-1px); }
        .btn-outline:hover { background: #f1f5f9; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 1.5rem; justify-content: center; }
        .config-row { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 1.2rem; align-items: center; }
        .config-row label { font-weight: 600; color: #0f172a; font-size: 0.9rem; }
        .config-row select, .config-row input { padding: 6px 12px; border: 1px solid #cbd5e1; border-radius: 0.8rem; font-size: 0.9rem; }
        .batch-list { margin-top: 1rem; }
        .batch-item { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 0.8rem; padding: 0.5rem 1rem; margin-bottom: 4px; font-family: 'SF Mono', monospace; font-size: 0.85rem; color: #0f172a; display: flex; align-items: center; gap: 8px; }
        .batch-item .idx { color: #94a3b8; font-size: 0.75rem; min-width: 24px; }
        .footer { background: #f1f5f9; padding: 1rem 2rem; text-align: center; font-size: 0.8rem; color: #475569; border-top: 1px solid #e2e8f0; }
        .footer a { color: #15607a; text-decoration: none; }
        .toast-msg { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 8px 20px; border-radius: 40px; font-size: 0.8rem; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; }
        @media (max-width: 680px) { .container { padding: 1.2rem; } .current-uuid span { font-size: 0.85rem; } }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>🆔 UUID 生成器 <span class="badge">v4 · 批量生成</span></h1>
        <p>生成随机 UUID（v4），支持批量生成，基于 crypto.randomUUID()</p>
    </div>
    <div class="container">
        <div class="current-uuid">
            <span id="uuidDisplay">点击生成按钮...</span>
            <button class="btn btn-outline" id="copyBtn" style="padding:8px 14px;">📋</button>
        </div>
        <div class="config-row">
            <label>生成数量</label>
            <input type="number" id="countInput" value="1" min="1" max="100" style="width:80px;">
            <label style="margin-left:12px;">格式</label>
            <select id="fmtSelect">
                <option value="lower">小写 (550e8400-...)</option>
                <option value="upper">大写 (550E8400-...)</option>
                <option value="nohyphen">无连字符 (550e8400...)</option>
            </select>
        </div>
        <div class="toolbar">
            <button class="btn btn-primary" id="generateBtn">🔄 生成 UUID</button>
            <button class="btn btn-outline" id="copyAllBtn">📋 复制全部</button>
            <button class="btn btn-outline" id="clearBtn">🗑️ 清空列表</button>
        </div>
        <div class="batch-list" id="batchList"></div>
    </div>
    <div class="footer">🧰 ACE 实验室 · 开源工具 | <a href="https://github.com/ace-trump-tech/html-lab" target="_blank">GitHub 仓库</a> &nbsp;| <a href="../"><strong>← 返回首页</strong></a></div>
</div>
<div id="toastMsg" class="toast-msg">📋 已复制</div>
<script>
(function() {
    var uuidDisplay = document.getElementById('uuidDisplay');
    var batchList = document.getElementById('batchList');
    var toast = document.getElementById('toastMsg');
    var toastTimer = null;
    var uuids = [];

    function showToast(msg) {
        if (toastTimer) clearTimeout(toastTimer);
        toast.textContent = msg; toast.style.background = '#0f172a';
        toast.style.opacity = '1'; toastTimer = setTimeout(function() { toast.style.opacity = '0'; }, 1500);
    }

    function genUUID() {
        var uuid = crypto.randomUUID();
        var fmt = document.getElementById('fmtSelect').value;
        if (fmt === 'upper') uuid = uuid.toUpperCase();
        else if (fmt === 'nohyphen') uuid = uuid.replace(/-/g, '');
        return uuid;
    }

    function doGenerate() {
        var count = parseInt(document.getElementById('countInput').value) || 1;
        count = Math.max(1, Math.min(100, count));
        uuids = [];
        for (var i = 0; i < count; i++) uuids.push(genUUID());
        uuidDisplay.textContent = uuids[0];
        renderList();
        showToast('✅ 已生成 ' + count + ' 个 UUID');
    }

    function renderList() {
        var html = '';
        uuids.forEach(function(uuid, i) {
            html += '<div class="batch-item"><span class="idx">#' + (i + 1) + '</span><span style="flex:1;word-break:break-all;">' + uuid + '</span><button class="btn btn-outline" style="padding:2px 10px;font-size:0.75rem;" data-idx="' + i + '">📋</button></div>';
        });
        batchList.innerHTML = html;
        batchList.querySelectorAll('button').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                var idx = parseInt(this.dataset.idx);
                navigator.clipboard.writeText(uuids[idx]).then(function() { showToast('📋 已复制 UUID #' + (idx + 1)); });
            });
        });
    }

    document.getElementById('generateBtn').addEventListener('click', doGenerate);
    document.getElementById('copyBtn').addEventListener('click', function() {
        var text = uuidDisplay.textContent;
        if (!text || text === '点击生成按钮...') { showToast('⚠️ 请先生成 UUID'); return; }
        navigator.clipboard.writeText(text).then(function() { showToast('📋 UUID 已复制'); });
    });
    document.getElementById('copyAllBtn').addEventListener('click', function() {
        if (!uuids.length) { showToast('⚠️ 请先生成 UUID'); return; }
        navigator.clipboard.writeText(uuids.join('\n')).then(function() { showToast('📋 已复制 ' + uuids.length + ' 个 UUID'); });
    });
    document.getElementById('clearBtn').addEventListener('click', function() { uuids = []; uuidDisplay.textContent = '点击生成按钮...'; batchList.innerHTML = ''; showToast('🧹 已清空'); });
    doGenerate();
})();
</script>
</body>
</html>
