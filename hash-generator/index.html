<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>哈希生成器 | 在线工具</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; }
        body {
            background: linear-gradient(145deg, #f5f7fc 0%, #e9eef5 100%);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 20px; margin: 0;
        }
        .card {
            max-width: 900px; width: 100%;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header { background: #0f172a; padding: 1.2rem 2rem; color: white; }
        .header h1 { margin: 0; font-size: 1.8rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .badge { background: #2dd4bf20; border-radius: 40px; padding: 0.2rem 0.8rem; font-size: 0.8rem; border: 1px solid #2dd4bf50; }
        .container { padding: 2rem; }
        label { display: block; font-weight: 600; color: #0f172a; margin-bottom: 6px; }
        textarea {
            width: 100%; padding: 1rem; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
            font-size: 0.9rem; border: 1px solid #cbd5e1; border-radius: 1.2rem;
            background: white; resize: vertical; line-height: 1.5; margin-bottom: 1rem;
        }
        textarea:focus { outline: none; border-color: #0f172a; box-shadow: 0 0 0 3px #0f172a20; }
        .algo-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 1.2rem; }
        .algo-btn {
            padding: 8px 18px; border-radius: 60px; font-weight: 500; cursor: pointer; transition: 0.2s;
            font-size: 0.85rem; border: 1px solid #cbd5e1; background: white; font-family: 'SF Mono', monospace;
        }
        .algo-btn:hover { background: #f1f5f9; }
        .algo-btn.active { background: #0f172a; color: white; border-color: #0f172a; }
        .hash-output {
            background: #1e293b; border-radius: 1.2rem; padding: 1rem 1.2rem;
            color: #86efac; font-family: 'SF Mono', 'Cascadia Code', monospace;
            font-size: 0.9rem; word-break: break-all; line-height: 1.5; min-height: 60px;
            display: flex; align-items: center; gap: 12px;
        }
        .hash-output span { flex: 1; }
        .btn {
            background: white; border: 1px solid #cbd5e1; padding: 8px 16px;
            border-radius: 60px; font-weight: 500; cursor: pointer; transition: 0.2s; font-size: 0.85rem;
            white-space: nowrap;
        }
        .btn-outline:hover { background: #f1f5f9; }
        .footer { background: #f1f5f9; padding: 1rem 2rem; text-align: center; font-size: 0.8rem; color: #475569; border-top: 1px solid #e2e8f0; }
        .footer a { color: #15607a; text-decoration: none; }
        .toast-msg {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: #0f172a; color: white; padding: 8px 20px; border-radius: 40px;
            font-size: 0.8rem; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999;
        }
        .note { font-size: 0.8rem; color: #94a3b8; margin-top: 0.5rem; }
        @media (max-width: 680px) { .container { padding: 1.2rem; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.js"></script>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>🔐 哈希生成器 <span class="badge">MD5 · SHA · 纯前端</span></h1>
        <p>生成文本的哈希摘要，支持 MD5 / SHA-1 / SHA-256 / SHA-512</p>
    </div>
    <div class="container">
        <label>📝 输入文本</label>
        <textarea id="inputText" rows="4" placeholder="输入要计算哈希的文本..."></textarea>
        <div class="algo-row" id="algoRow">
            <button class="algo-btn active" data-algo="MD5">MD5</button>
            <button class="algo-btn" data-algo="SHA-1">SHA-1</button>
            <button class="algo-btn" data-algo="SHA-256">SHA-256</button>
            <button class="algo-btn" data-algo="SHA-512">SHA-512</button>
        </div>
        <div class="hash-output">
            <span id="hashText">-</span>
            <button class="btn btn-outline" id="copyBtn">📋 复制</button>
        </div>
        <p class="note">💡 使用 CryptoJS 库在浏览器本地计算，数据不会上传。</p>
    </div>
    <div class="footer">
        🧰 ACE 实验室 · 开源工具 | <a href="https://github.com/ace-trump-tech/html-lab" target="_blank">GitHub 仓库</a> &nbsp;| <a href="../"><strong>← 返回首页</strong></a>
    </div>
</div>
<div id="toastMsg" class="toast-msg">📋 已复制</div>

<script>
(function() {
    var inputTa = document.getElementById('inputText');
    var hashText = document.getElementById('hashText');
    var toast = document.getElementById('toastMsg');
    var toastTimer = null;
    var currentAlgo = 'MD5';

    function showToast(msg, isErr) {
        if (toastTimer) clearTimeout(toastTimer);
        toast.textContent = msg;
        toast.style.background = isErr ? '#be123c' : '#0f172a';
        toast.style.opacity = '1';
        toastTimer = setTimeout(function() { toast.style.opacity = '0'; }, 1800);
    }

    function computeHash() {
        var val = inputTa.value;
        if (!val) { hashText.textContent = '-'; return; }
        try {
            var hash;
            switch (currentAlgo) {
                case 'MD5': hash = CryptoJS.MD5(val).toString(); break;
                case 'SHA-1': hash = CryptoJS.SHA1(val).toString(); break;
                case 'SHA-256': hash = CryptoJS.SHA256(val).toString(); break;
                case 'SHA-512': hash = CryptoJS.SHA512(val).toString(); break;
                default: hash = CryptoJS.SHA256(val).toString();
            }
            hashText.textContent = hash;
        } catch (e) {
            hashText.textContent = '计算错误: ' + e.message;
        }
    }

    inputTa.addEventListener('input', computeHash);

    document.getElementById('algoRow').addEventListener('click', function(e) {
        if (e.target.classList.contains('algo-btn')) {
            document.querySelectorAll('.algo-btn').forEach(function(b) { b.classList.remove('active'); });
            e.target.classList.add('active');
            currentAlgo = e.target.dataset.algo;
            computeHash();
        }
    });

    document.getElementById('copyBtn').addEventListener('click', function() {
        var text = hashText.textContent;
        if (!text || text === '-') { showToast('⚠️ 没有可复制的内容', true); return; }
        navigator.clipboard.writeText(text).then(function() {
            showToast('📋 哈希值已复制');
        }).catch(function() {
            var ta = document.createElement('textarea');
            ta.value = text; document.body.appendChild(ta);
            ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
            showToast('📋 哈希值已复制 (fallback)');
        });
    });
})();
</script>
</body>
</html>
